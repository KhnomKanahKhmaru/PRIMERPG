<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .page {
      padding-top: 84px;
      display: flex;
      min-height: 100vh;
    }
    .left-panel { width: 240px; flex-shrink: 0; border-right: 1px solid #1a1a1a; padding: 20px 14px; }
    .right-panel { width: 240px; flex-shrink: 0; border-left: 1px solid #1a1a1a; }
    .center-panel { flex: 1; padding: 24px; text-align: center; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }
    .news-empty { color: #555; font-size: 13px; text-align: center; padding: 60px 0; font-style: italic; }
    .news-item { padding: 12px 14px; border: 1px solid #1a1a1a; border-radius: 4px; background: #111; display: flex; gap: 12px; align-items: flex-start; }
    .news-source { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #888; margin-bottom: 4px; }
    .news-source a { color: #aaa; text-decoration: none; }
    .news-source a:hover { color: #fff; }
    .news-text { color: #ccc; font-size: 13px; line-height: 1.5; }
    .news-text strong { color: #fff; font-weight: 600; }
    .news-time { font-size: 11px; color: #666; margin-top: 4px; }
    .news-body { flex: 1; min-width: 0; }
    .panel-section { margin-bottom: 24px; }
    .panel-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #aaa;
      padding: 0 4px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a1a;
    }
    .panel-link {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      transition: background 0.1s, border-color 0.1s, color 0.1s, transform 0.1s;
    }
    .panel-link:hover { color: #fff; background: #181818; border-color: #444; transform: translateX(2px); }
    .panel-empty {
      padding: 8px 12px;
      font-size: 12px;
      color: #555;
      font-style: italic;
      background: #0e0e0e;
      border: 1px dashed #1a1a1a;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="page">
  <div class="left-panel">
    <div class="panel-section">
      <div class="panel-title">My Playgroups</div>
      <div id="pg-links"><div class="panel-empty">Loading...</div></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">My Characters</div>
      <div id="char-links"><div class="panel-empty">Loading...</div></div>
    </div>
  </div>
  <div class="center-panel">
    <div class="section-title">Playgroup News</div>
    <div id="news-feed" style="max-width:680px;margin:0 auto;text-align:left;display:flex;flex-direction:column;gap:6px"></div>
    <div class="news-empty" id="news-empty" style="display:none">No news yet!</div>
  </div>
  <div class="right-panel"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // wait for firebase to finish restoring auth from storage — prevents redirect loop
  await auth.authStateReady();

  const user = auth.currentUser;
  if (!user || !user.emailVerified) {
    window.location.href = 'index.html';
  } else {
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);
    initAlerts(db, user.uid);

    const pgLinks = document.getElementById('pg-links');
    const q = query(collection(db, 'memberships'), where('uid', '==', user.uid));
    const snap = await getDocs(q);

    if (snap.empty) {
      pgLinks.innerHTML = '<div class="panel-empty">None yet.</div>';
    } else {
      pgLinks.innerHTML = '';
      for (const mDoc of snap.docs) {
        const pgDoc = await getDoc(doc(db, 'playgroups', mDoc.data().playgroupId));
        if (!pgDoc.exists()) continue;
        pgLinks.innerHTML += `<a class="panel-link" href="playgroup.html?id=${pgDoc.id}">${pgDoc.data().name}</a>`;
      }
    }

    const charLinks = document.getElementById('char-links');
    const charQ = query(collection(db, 'characters'), where('uid', '==', user.uid));
    const charSnap = await getDocs(charQ);
    if (charSnap.empty) {
      charLinks.innerHTML = '<div class="panel-empty">None yet.</div>';
    } else {
      charLinks.innerHTML = charSnap.docs.map(d => {
        const name = d.data().name || 'Unnamed';
        return `<a class="panel-link" href="character.html?id=${d.id}">${name}</a>`;
      }).join('');
    }

    // ── News Feed ──
    const myPgIds = snap.docs.map(m => m.data().playgroupId).filter(Boolean);
    const feedEl = document.getElementById('news-feed');
    const emptyEl = document.getElementById('news-empty');
    if (myPgIds.length === 0) {
      emptyEl.textContent = 'Join a playgroup to see news here.';
      emptyEl.style.display = 'block';
    } else {
      // Firestore `in` query caps at 30; for now this is fine
      const chunks = [];
      for (let i = 0; i < myPgIds.length; i += 30) chunks.push(myPgIds.slice(i, i + 30));
      const allItems = [];
      for (const chunk of chunks) {
        const newsQ = query(collection(db, 'playgroupNews'), where('playgroupId', 'in', chunk));
        const newsSnap = await getDocs(newsQ);
        newsSnap.docs.forEach(d => allItems.push({ id: d.id, ...d.data() }));
      }
      allItems.sort((a, b) => {
        const at = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
        const bt = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
        return bt - at;
      });
      if (allItems.length === 0) {
        emptyEl.style.display = 'block';
      } else {
        feedEl.innerHTML = allItems.slice(0, 50).map(n => `
          <div class="news-item">
            <div class="news-body">
              <div class="news-source"><a href="playgroup.html?id=${n.playgroupId}">${n.playgroupName || 'Playgroup'}</a></div>
              <div class="news-text">${renderNewsText(n.text)}</div>
              <div class="news-time">${formatNewsTime(n.createdAt)}</div>
            </div>
          </div>`).join('');
      }
    }
  }

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
