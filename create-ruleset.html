<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Create Ruleset</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .page {
      padding-top: 104px;
      max-width: 640px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
      padding-bottom: 60px;
    }
    .page-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: #e0e0e0; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
      margin-top: 28px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a1a;
    }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #555;
    }
    .field input, .field select {
      background: #111;
      border: 1px solid #222;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 4px;
      outline: none;
      width: 100%;
    }
    .field input:focus, .field select:focus { border-color: #444; }
    .field select option { background: #111; }
    .morals-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .moral-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 12px;
      color: #888;
    }
    .moral-tag .remove-btn {
      cursor: pointer;
      color: #444;
      font-size: 14px;
      line-height: 1;
    }
    .moral-tag .remove-btn:hover { color: #c84b4b; }
    .add-moral-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .add-moral-row input {
      flex: 1;
      background: #111;
      border: 1px solid #222;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 4px;
      outline: none;
    }
    .add-moral-row input:focus { border-color: #444; }
    .add-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    .add-btn:hover { background: #222; border-color: #555; }
    .submit-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #222; border-color: #555; }
    .message { font-size: 12px; margin-top: 12px; }
    .hint { font-size: 11px; color: #444; margin-bottom: 8px; }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="page">
  <div class="page-title">Create Ruleset</div>

  <div class="field">
    <label>Ruleset Name</label>
    <input type="text" id="rs-name" placeholder="Name your ruleset...">
  </div>

  <div class="field">
    <label>Playgroup</label>
    <select id="rs-playgroup">
      <option value="">Loading your playgroups...</option>
    </select>
  </div>

  <div class="section-title">Morals</div>
  <div class="hint">Add the Morals available to characters using this ruleset. You can start from the Basic Set or build your own.</div>

  <div class="morals-grid" id="morals-list"></div>

  <div class="add-moral-row">
    <input type="text" id="new-moral" placeholder="Add a moral..." onkeydown="if(event.key==='Enter')addMoral()">
    <button class="add-btn" onclick="addMoral()">Add</button>
  </div>

  <div class="hint" id="basic-set-hint"></div>
  <button class="add-btn" id="import-basic-btn" onclick="importBasicSet()" style="margin-bottom:16px">Import Basic Set Morals</button>

  <br>
  <button class="submit-btn" id="submit-btn" onclick="createRuleset()">Create Ruleset</button>
  <div class="message" id="rs-message"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentUser = null;
  let morals = [];
  let basicSetMorals = [];
  let userPlaygroups = [];

  onAuthStateChanged(auth, async function(user) {
    if (!user || !user.emailVerified) {
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);

    // load basic set
    const basicQ = query(collection(db, 'rulesets'), where('isBasicSet', '==', true));
    const basicSnap = await getDocs(basicQ);
    if (!basicSnap.empty) {
      basicSetMorals = basicSnap.docs[0].data().morals || [];
      document.getElementById('basic-set-hint').textContent =
        'Basic Set includes: ' + basicSetMorals.join(', ');
    }

    // load playgroups where user is Leader or Admin
    const membQ = query(collection(db, 'memberships'), where('uid', '==', user.uid));
    const membSnap = await getDocs(membQ);
    const sel = document.getElementById('rs-playgroup');
    sel.innerHTML = '<option value="">None (personal ruleset)</option>';
    for (const mDoc of membSnap.docs) {
      const role = mDoc.data().role;
      if (role !== 'Leader' && role !== 'Administrator') continue;
      const pgDoc = await getDoc(doc(db, 'playgroups', mDoc.data().playgroupId));
      if (pgDoc.exists()) {
        userPlaygroups.push({ id: pgDoc.id, name: pgDoc.data().name });
        const opt = document.createElement('option');
        opt.value = pgDoc.id;
        opt.textContent = pgDoc.data().name;
        sel.appendChild(opt);
      }
    }
  });

  function renderMorals() {
    const list = document.getElementById('morals-list');
    if (morals.length === 0) {
      list.innerHTML = '<span style="color:#444;font-size:12px">No morals added yet.</span>';
      return;
    }
    list.innerHTML = morals.map((m, i) => `
      <div class="moral-tag">
        ${m}
        <span class="remove-btn" onclick="removeMoral(${i})">×</span>
      </div>
    `).join('');
  }

  window.addMoral = function() {
    const input = document.getElementById('new-moral');
    const val = input.value.trim();
    if (!val) return;
    if (morals.includes(val)) {
      input.value = '';
      return;
    }
    morals.push(val);
    input.value = '';
    renderMorals();
  }

  window.removeMoral = function(i) {
    morals.splice(i, 1);
    renderMorals();
  }

  window.importBasicSet = function() {
    basicSetMorals.forEach(m => {
      if (!morals.includes(m)) morals.push(m);
    });
    renderMorals();
  }

  window.createRuleset = async function() {
    if (!currentUser) return;
    const name = document.getElementById('rs-name').value.trim();
    const pgId = document.getElementById('rs-playgroup').value;
    const msg = document.getElementById('rs-message');

    if (!name) {
      msg.textContent = 'Please enter a ruleset name.';
      msg.style.color = '#ff6666';
      return;
    }
    if (morals.length === 0) {
      msg.textContent = 'Please add at least one moral.';
      msg.style.color = '#ff6666';
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Creating...';

    try {
      const ref = await addDoc(collection(db, 'rulesets'), {
        name: name,
        isBasicSet: false,
        createdBy: currentUser.uid,
        playgroupId: pgId || null,
        morals: morals,
        createdAt: new Date()
      });
      msg.textContent = 'Ruleset created!';
      msg.style.color = '#66ff99';
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 800);
    } catch(e) {
      msg.textContent = 'Error: ' + e.message;
      msg.style.color = '#ff6666';
      btn.disabled = false;
      btn.textContent = 'Create Ruleset';
    }
  }

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
