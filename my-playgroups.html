<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — My Playgroups</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .page {
      padding-top: 104px;
      max-width: 720px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }
    .page-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #e0e0e0;
    }
    .pg-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .pg-card:hover { border-color: #333; }
    .pg-card-name {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 4px;
    }
    .pg-card-primer {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
    }
    .pg-card-role {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #1a1a1a;
      color: #666;
      display: inline-block;
    }
    .empty {
      color: #444;
      font-size: 13px;
      text-align: center;
      padding: 60px 0;
    }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="page">
  <div class="page-title">My Playgroups</div>
  <div id="pg-list">
    <div class="pg-card" id="loading-card">
      <div class="pg-card-name" style="color:#333">Loading playgroups...</div>
      <div class="pg-card-primer" style="color:#222">Please wait</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async function(user) {
    if (!user || !user.emailVerified) {
      window.location.href = 'index.html';
      return;
    }

    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);

    const list = document.getElementById('pg-list');
    list.innerHTML = '';
    const q = query(collection(db, 'memberships'), where('uid', '==', user.uid));
    const snap = await getDocs(q);

    if (snap.empty) {
      list.innerHTML = '<div class="empty">You are not in any playgroups yet.</div>';
      return;
    }

    for (const memberDoc of snap.docs) {
      const membership = memberDoc.data();
      const pgDoc = await getDoc(doc(db, 'playgroups', membership.playgroupId));
      if (!pgDoc.exists()) continue;
      const pg = pgDoc.data();
      list.innerHTML += `
        <div class="pg-card" onclick="window.location.href='playgroup.html?id=${pgDoc.id}'">
          <div class="pg-card-name">${pg.name}</div>
          <div class="pg-card-primer">${pg.primer || ''}</div>
          <span class="pg-card-role">${membership.role}</span>
        </div>`;
    }
  });

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
