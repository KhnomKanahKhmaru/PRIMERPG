<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — My Rulesets</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 14px; min-height: 100vh; }
    .page { padding-top: 104px; max-width: 760px; margin: 0 auto; padding: 104px 24px 60px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .page-title { font-size: 18px; font-weight: 600; color: #e0e0e0; }
    .new-btn { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 7px 16px; border-radius: 4px; cursor: pointer; text-decoration: none; }
    .new-btn:hover { background: #222; border-color: #555; }
    .rs-card { background: #111; border: 1px solid #1e1e1e; border-radius: 4px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s; }
    .rs-card:hover { border-color: #333; }
    .rs-card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
    .rs-card-name { font-size: 15px; font-weight: 600; color: #e0e0e0; flex: 1; }
    .rs-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .rs-btn { font-size: 11px; font-family: 'Open Sans', sans-serif; padding: 4px 10px; border-radius: 3px; cursor: pointer; text-decoration: none; display: inline-block; }
    .rs-btn.edit { background: #1a1a1a; border: 1px solid #333; color: #ccc; }
    .rs-btn.edit:hover { background: #222; border-color: #555; }
    .rs-btn.delete { background: transparent; border: 1px solid #4a1a1a; color: #c84b4b; font-family: 'Open Sans', sans-serif; }
    .rs-btn.delete:hover { background: #2a1313; border-color: #6a2a2a; }
    .rs-card-meta { font-size: 12px; color: #666; margin-bottom: 8px; }
    .rs-card-stats { font-size: 11px; color: #888; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 10px; }
    .rs-card-stats span strong { color: #ccc; }
    .rs-card-morals { font-size: 11px; color: #444; line-height: 1.7; }
    .rs-card-morals span { display: inline-block; background: #1a1a1a; border: 1px solid #222; border-radius: 3px; padding: 2px 8px; margin: 2px 2px 0 0; color: #888; }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 60px 0; }
    .section-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #888; margin-bottom: 8px; margin-top: 24px; padding-bottom: 4px; border-bottom: 1px solid #1a1a1a; }
    .section-label:first-child { margin-top: 0; }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="page">
  <div class="page-header">
    <div class="page-title">My Rulesets</div>
    <a class="new-btn" href="edit-ruleset.html">+ New Ruleset</a>
  </div>
  <div id="rs-list"><div class="empty">Loading...</div></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let myUid = null;
  let adminPlaygroupIds = new Set();

  await auth.authStateReady();
  const user = auth.currentUser;
  if (!user || !user.emailVerified) {
    window.location.href = 'index.html';
  } else {
    myUid = user.uid;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);
    initAlerts(db, user.uid);

    // figure out which playgroups I'm Leader/Admin of
    const membQ = query(collection(db, 'memberships'), where('uid', '==', user.uid));
    const membSnap = await getDocs(membQ);
    for (const mDoc of membSnap.docs) {
      const r = mDoc.data().role;
      if (r === 'Leader' || r === 'Administrator') adminPlaygroupIds.add(mDoc.data().playgroupId);
    }

    const list = document.getElementById('rs-list');
    list.innerHTML = '';

    // Basic Set
    const basicQ = query(collection(db, 'rulesets'), where('isBasicSet', '==', true));
    const basicSnap = await getDocs(basicQ);
    if (!basicSnap.empty) {
      list.innerHTML += '<div class="section-label">Basic Set</div>';
      basicSnap.docs.forEach(d => {
        const canEdit = myUid === window.SITE_ADMIN_UID;
        list.innerHTML += renderCard(d, { isBasic: true, canEdit, canDelete: false });
      });
    }

    // My Personal
    const myQ = query(collection(db, 'rulesets'), where('createdBy', '==', user.uid));
    const mySnap = await getDocs(myQ);
    const myPersonal = mySnap.docs.filter(d => !d.data().isBasicSet && !d.data().playgroupId);
    if (myPersonal.length > 0) {
      list.innerHTML += '<div class="section-label">My Personal Rulesets</div>';
      myPersonal.forEach(d => {
        list.innerHTML += renderCard(d, { canEdit: true, canDelete: true });
      });
    }

    // Playgroup Rulesets — loaded from playgroups I'm a member of
    const myAllPgIds = membSnap.docs.map(d => d.data().playgroupId);
    const seenIds = new Set();
    const pgCards = [];
    for (const pgId of myAllPgIds) {
      const pgRsQ = query(collection(db, 'rulesets'), where('playgroupId', '==', pgId));
      const pgRsSnap = await getDocs(pgRsQ);
      for (const d of pgRsSnap.docs) {
        if (seenIds.has(d.id)) continue;
        seenIds.add(d.id);
        const pgDoc = await getDoc(doc(db, 'playgroups', d.data().playgroupId));
        const pgName = pgDoc.exists() ? pgDoc.data().name : 'Unknown';
        const canManage = adminPlaygroupIds.has(d.data().playgroupId);
        pgCards.push(renderCard(d, { canEdit: canManage, canDelete: canManage, pgName }));
      }
    }
    if (pgCards.length > 0) {
      list.innerHTML += '<div class="section-label">Playgroup Rulesets</div>' + pgCards.join('');
    }

    if (list.innerHTML.indexOf('rs-card') === -1) {
      list.innerHTML = '<div class="empty">No rulesets found.</div>';
    }
  }

  function renderCard(d, opts) {
    const rs = d.data();
    const { isBasic, canEdit, canDelete, pgName } = opts;
    const morals = (rs.morals || []).map(m => `<span>${m || '<em style="opacity:.6">Custom…</em>'}</span>`).join('');
    const meta = isBasic ? 'Basic Set — always available to all characters' : pgName ? `Playgroup: ${pgName}` : 'Personal ruleset';

    const startingXp = rs.startingXp ?? 100;
    const pLevels = (rs.powerLevels || []).length || 6;
    const pSkills = (rs.primarySkills || []).length || 16;
    const statCount = (rs.stats || []).length || 7;
    const moralCount = (rs.morals || []).length;

    const editBtn = canEdit ? `<a class="rs-btn edit" href="edit-ruleset.html?id=${d.id}">Edit</a>` : '';
    const deleteBtn = canDelete ? `<button class="rs-btn delete" onclick="deleteRuleset('${d.id}', event)">Delete</button>` : '';

    return `
      <div class="rs-card">
        <div class="rs-card-header">
          <div class="rs-card-name">${rs.name}</div>
          <div class="rs-card-actions">${editBtn}${deleteBtn}</div>
        </div>
        <div class="rs-card-meta">${meta}</div>
        <div class="rs-card-stats">
          <span>Start: <strong>${startingXp} XP</strong></span>
          <span>Power Levels: <strong>${pLevels}</strong></span>
          <span>Stats: <strong>${statCount}</strong></span>
          <span>Primary Skills: <strong>${pSkills}</strong></span>
          <span>Morals: <strong>${moralCount}</strong></span>
        </div>
        ${morals ? `<div class="rs-card-morals">${morals}</div>` : ''}
      </div>`;
  }

  window.deleteRuleset = async function(id, e) {
    e.stopPropagation(); e.preventDefault();
    if (!confirm('Delete this ruleset? Characters using it will fall back to defaults.')) return;
    try {
      await deleteDoc(doc(db, 'rulesets', id));
      window.location.reload();
    } catch(err) { alert('Error deleting ruleset: ' + err.message); }
  }

  window.logout = async function() { await signOut(auth); window.location.href = 'index.html'; }
</script>
</body>
</html>
