<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — My Rulesets</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .page {
      padding-top: 104px;
      max-width: 720px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
      padding-bottom: 60px;
    }
    .page-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: #e0e0e0; }
    .rs-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .rs-card:hover { border-color: #333; }
    .rs-card-name { font-size: 15px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; }
    .rs-card-meta { font-size: 12px; color: #555; margin-bottom: 8px; }
    .rs-card-morals { font-size: 11px; color: #444; }
    .rs-card-morals span {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 3px;
      padding: 2px 6px;
      margin: 2px 2px 0 0;
      color: #666;
    }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 60px 0; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 8px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="page">
  <div class="page-title">My Rulesets</div>
  <div id="rs-list"><div class="empty">Loading...</div></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async function(user) {
    if (!user || !user.emailVerified) {
      window.location.href = 'index.html';
      return;
    }
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);

    const list = document.getElementById('rs-list');

    // load basic set
    const basicQ = query(collection(db, 'rulesets'), where('isBasicSet', '==', true));
    const basicSnap = await getDocs(basicQ);

    // load user's own rulesets
    const myQ = query(collection(db, 'rulesets'), where('createdBy', '==', user.uid));
    const mySnap = await getDocs(myQ);

    // load playgroup rulesets for groups the user is in
    const membQ = query(collection(db, 'memberships'), where('uid', '==', user.uid));
    const membSnap = await getDocs(membQ);
    const pgIds = membSnap.docs.map(d => d.data().playgroupId);

    let pgRulesets = [];
    for (const pgId of pgIds) {
      const pgRsQ = query(collection(db, 'rulesets'), where('playgroupId', '==', pgId));
      const pgRsSnap = await getDocs(pgRsQ);
      pgRulesets = pgRulesets.concat(pgRsSnap.docs);
    }

    list.innerHTML = '';

    // Basic Set
    if (!basicSnap.empty) {
      list.innerHTML += '<div class="section-label">Basic Set</div>';
      basicSnap.docs.forEach(d => {
        list.innerHTML += renderCard(d, true);
      });
    }

    // My Rulesets
    const myPersonal = mySnap.docs.filter(d => !d.data().isBasicSet && !d.data().playgroupId);
    if (myPersonal.length > 0) {
      list.innerHTML += '<div class="section-label">My Personal Rulesets</div>';
      myPersonal.forEach(d => list.innerHTML += renderCard(d, false));
    }

    // Playgroup Rulesets
    const seenIds = new Set();
    const uniquePgRulesets = pgRulesets.filter(d => {
      if (seenIds.has(d.id)) return false;
      seenIds.add(d.id);
      return true;
    });
    if (uniquePgRulesets.length > 0) {
      list.innerHTML += '<div class="section-label">Playgroup Rulesets</div>';
      for (const d of uniquePgRulesets) {
        const pgDoc = await getDoc(doc(db, 'playgroups', d.data().playgroupId));
        const pgName = pgDoc.exists() ? pgDoc.data().name : 'Unknown Playgroup';
        list.innerHTML += renderCard(d, false, pgName);
      }
    }

    if (list.innerHTML === '') {
      list.innerHTML = '<div class="empty">No rulesets found.</div>';
    }
  });

  function renderCard(d, isBasic, pgName) {
    const rs = d.data();
    const morals = (rs.morals || []).map(m => `<span>${m}</span>`).join('');
    const meta = isBasic ? 'Basic Set — available to all characters' :
      pgName ? `Playgroup: ${pgName}` : 'Personal ruleset';
    return `
      <div class="rs-card">
        <div class="rs-card-name">${rs.name}</div>
        <div class="rs-card-meta">${meta}</div>
        <div class="rs-card-morals">${morals}</div>
      </div>`;
  }

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
