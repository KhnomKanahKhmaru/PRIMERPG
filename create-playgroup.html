<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Create Playgroup</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 4px;
      z-index: 100;
    }
    .topbar-item {
      position: relative;
      padding: 8px 14px;
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
      border-radius: 4px;
      user-select: none;
    }
    .topbar-item:hover { color: #fff; background: #1e1e1e; }
    .topbar-item.home { color: #fff; font-weight: 600; margin-right: 10px; }
    .dropdown {
      display: none;
      position: absolute;
      top: 100%; left: 0;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      min-width: 160px;
      z-index: 200;
    }
    .topbar-item:hover .dropdown { display: block; }
    .dropdown a {
      display: block;
      padding: 9px 14px;
      color: #aaa;
      text-decoration: none;
      font-size: 13px;
    }
    .dropdown a:hover { color: #fff; background: #1e1e1e; }
    .dropdown-divider { border: none; border-top: 1px solid #222; margin: 4px 0; }
    .page {
      padding-top: 64px;
      max-width: 600px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }
    .page-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #e0e0e0;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #555;
    }
    .field input, .field textarea {
      background: #111;
      border: 1px solid #222;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 4px;
      outline: none;
      width: 100%;
    }
    .field input:focus, .field textarea:focus { border-color: #444; }
    .field textarea { resize: vertical; min-height: 80px; }
    .submit-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #222; border-color: #555; }
    .message { font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-item home" onclick="window.location.href='home.html'">PRIME RPG</div>
  <div class="topbar-item" onclick="window.location.href='home.html'">Home</div>
  <div class="topbar-item">
    Documentation
    <div class="dropdown">
      <a href="#">Rules</a>
      <a href="#">Combat</a>
      <a href="#">Characters</a>
    </div>
  </div>
  <div class="topbar-item">
    Navigation
    <div class="dropdown">
      <a href="#">My Characters</a>
      <a href="#">My Playgroups</a>
      <a href="#">My Scenarios</a>
    </div>
  </div>
  <div class="topbar-item">
    Alerts
    <div class="dropdown">
      <a href="#">No alerts</a>
    </div>
  </div>
  <div class="topbar-item" style="margin-left:auto">
    Account
    <div class="dropdown" style="left:auto;right:0">
      <a href="#">View Account</a>
      <a href="#">Account Settings</a>
      <a href="#">Messages</a>
      <hr class="dropdown-divider">
      <a href="#" onclick="logout()">Log Out</a>
    </div>
  </div>
</div>

<div class="page">
  <div class="page-title">Create Playgroup</div>
  <div class="field">
    <label>Playgroup Name</label>
    <input type="text" id="pg-name" placeholder="Name your playgroup...">
  </div>
  <div class="field">
    <label>Primer</label>
    <textarea id="pg-primer" placeholder="A short description of your playgroup or setting..."></textarea>
  </div>
  <button class="submit-btn" onclick="createPlaygroup()">Create Playgroup</button>
  <div class="message" id="pg-message"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentUser = null;

  onAuthStateChanged(auth, function(user) {
    if (!user || !user.emailVerified) {
      window.location.href = 'index.html';
    } else {
      currentUser = user;
    }
  });

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }

  window.createPlaygroup = async function() {
    const name = document.getElementById('pg-name').value.trim();
    const primer = document.getElementById('pg-primer').value.trim();
    const msg = document.getElementById('pg-message');

    if (!name) {
      msg.textContent = 'Please enter a playgroup name.';
      msg.style.color = '#ff6666';
      return;
    }

    try {
      const pgRef = await addDoc(collection(db, 'playgroups'), {
        name: name,
        primer: primer,
        leader: currentUser.uid,
        ruleset: 'basic',
        createdAt: new Date()
      });

      await setDoc(doc(db, 'memberships', currentUser.uid + '_' + pgRef.id), {
        uid: currentUser.uid,
        playgroupId: pgRef.id,
        role: 'Leader',
        joinedAt: new Date()
      });

      msg.textContent = 'Playgroup created!';
      msg.style.color = '#66ff99';
      setTimeout(() => {
        window.location.href = 'playgroup.html?id=' + pgRef.id;
      }, 1000);
    } catch(e) {
      msg.textContent = 'Error creating playgroup. Try again.';
      msg.style.color = '#ff6666';
    }
  }
</script>
</body>
</html>
