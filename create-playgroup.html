<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Create Playgroup</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .page {
      padding-top: 64px;
      max-width: 600px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }
    .page-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #e0e0e0;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #555;
    }
    .field input, .field textarea {
      background: #111;
      border: 1px solid #222;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 4px;
      outline: none;
      width: 100%;
    }
    .field input:focus, .field textarea:focus { border-color: #444; }
    .field textarea { resize: vertical; min-height: 80px; }
    .submit-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #222; border-color: #555; }
    .message { font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="page">
  <div class="page-title">Create Playgroup</div>
  <div class="field">
    <label>Playgroup Name</label>
    <input type="text" id="pg-name" placeholder="Name your playgroup...">
  </div>
  <div class="field">
    <label>Primer</label>
    <textarea id="pg-primer" placeholder="A short description of your playgroup or setting..."></textarea>
  </div>
  <button class="submit-btn" onclick="createPlaygroup()">Create Playgroup</button>
  <div class="message" id="pg-message"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentUser = null;

  onAuthStateChanged(auth, async function(user) {
    if (!user || !user.emailVerified) {
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);
  });

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }

  window.createPlaygroup = async function() {
    const name = document.getElementById('pg-name').value.trim();
    const primer = document.getElementById('pg-primer').value.trim();
    const msg = document.getElementById('pg-message');

    if (!name) {
      msg.textContent = 'Please enter a playgroup name.';
      msg.style.color = '#ff6666';
      return;
    }

    try {
      const pgRef = await addDoc(collection(db, 'playgroups'), {
        name: name,
        primer: primer,
        leader: currentUser.uid,
        ruleset: 'basic',
        createdAt: new Date()
      });

      await setDoc(doc(db, 'memberships', currentUser.uid + '_' + pgRef.id), {
        uid: currentUser.uid,
        playgroupId: pgRef.id,
        role: 'Leader',
        joinedAt: new Date()
      });

      msg.textContent = 'Playgroup created!';
      msg.style.color = '#66ff99';
      setTimeout(() => {
        window.location.href = 'playgroup.html?id=' + pgRef.id;
      }, 1000);
    } catch(e) {
      msg.textContent = 'Error creating playgroup. Try again.';
      msg.style.color = '#ff6666';
    }
  }
</script>
</body>
</html>
