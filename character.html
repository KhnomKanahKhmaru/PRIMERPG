<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Character</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .page {
      padding-top: 104px;
      padding-left: 24px;
      padding-right: 24px;
      padding-bottom: 60px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 60px 0; }

    /* ── outer card ── */
    .char-card {
      display: flex;
      align-items: stretch;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      min-height: 320px;
    }

    /* ── picture column ── */
    .char-picture {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #222;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      min-height: 320px;
    }
    .char-picture img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
    }
    .char-picture-placeholder {
      color: #333;
      font-size: 12px;
      text-align: center;
      padding: 16px;
      z-index: 1;
    }
    .char-picture input[type=file] { display: none; }

    /* ── center biography column ── */
    .char-bio-col {
      flex: 1;
      padding: 20px 24px;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }

    /* ── name + quip row ── */
    .char-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 16px;
    }
    .char-header-left { flex: 1; }
    .char-name {
      font-size: 28px;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 4px;
    }
    .char-archetype {
      font-size: 15px;
      font-weight: 500;
      color: #666;
    }
    .char-quip-box {
      width: 260px;
      flex-shrink: 0;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 13px;
      font-style: italic;
      color: #555;
      background: #0e0e0e;
      min-height: 60px;
      cursor: pointer;
    }
    .char-quip-box.has-quip { color: #aaa; }

    /* ── biography section ── */
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .edit-btn {
      font-size: 11px;
      color: #555;
      cursor: pointer;
      padding: 2px 8px;
      border: 1px solid #333;
      border-radius: 3px;
      font-weight: 400;
    }
    .edit-btn:hover { color: #aaa; border-color: #555; }
    .bio-prose {
      font-size: 13px;
      color: #888;
      line-height: 1.9;
    }
    .bio-prose b { color: #ccc; font-weight: 600; }
    .bio-prose i { color: #888; font-style: italic; }

    /* ── edit form ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }
    .field label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #555;
    }
    .field input, .field textarea, .field select {
      background: #111;
      border: 1px solid #222;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 4px;
      outline: none;
      width: 100%;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #444; }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .field select option { background: #111; }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
    .save-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .save-btn:hover { background: #222; border-color: #555; }
    .save-msg { font-size: 11px; color: #66ff99; }

    /* ── ETC column ── */
    .char-etc-col {
      width: 220px;
      flex-shrink: 0;
      padding: 20px 16px;
      background: #0e0e0e;
    }
    .etc-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 10px;
    }
    .etc-content {
      font-size: 12px;
      color: #555;
      line-height: 1.7;
      min-height: 200px;
    }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="page">
  <div id="loading" class="empty">Loading...</div>
  <div id="char-content" style="display:none">

    <div class="char-card">

      <!-- Picture -->
      <div class="char-picture" id="picture-slot" onclick="triggerPicUpload()">
        <div class="char-picture-placeholder" id="pic-placeholder">Click to add picture</div>
        <img id="char-img" style="display:none">
        <input type="file" id="pic-input" accept="image/*" onchange="handlePicChange(event)">
      </div>

      <!-- Biography -->
      <div class="char-bio-col">
        <div class="char-header">
          <div class="char-header-left">
            <div class="char-name" id="char-name"></div>
            <div class="char-archetype" id="char-archetype"></div>
          </div>
          <div class="char-quip-box" id="char-quip" onclick="editQuip()"></div>
        </div>

        <div class="section-title">
          Biography
          <span id="bio-edit-btn" class="edit-btn" style="display:none" onclick="editBio()">Edit</span>
        </div>

        <div id="bio-view">
          <div class="bio-prose" id="bio-prose"></div>
        </div>

        <div id="bio-edit" style="display:none">
          <div class="field"><label>Name</label><input type="text" id="e-name" oninput="updatePreview()"></div>
          <div class="field"><label>Sex</label><input type="text" id="e-sex" oninput="updatePreview()"></div>
          <div class="field"><label>Age</label><input type="text" id="e-age" oninput="updatePreview()"></div>
          <div class="field"><label>Ethnicity</label><input type="text" id="e-ethnicity" oninput="updatePreview()"></div>
          <div class="field"><label>Paradigm</label><input type="text" id="e-paradigm" oninput="updatePreview()"></div>
          <div class="field"><label>Archetype</label><input type="text" id="e-archetype" oninput="updatePreview()"></div>
          <div class="field"><label>Residence</label><input type="text" id="e-residence" oninput="updatePreview()"></div>
          <div class="field">
            <label>World (Playgroup)</label>
            <select id="e-playgroup" onchange="updatePreview()">
              <option value="">None — not in active play</option>
            </select>
          </div>
          <div class="field"><label>Appearance</label><textarea id="e-appearance" oninput="updatePreview()"></textarea></div>
          <div class="btn-row">
            <button class="save-btn" onclick="saveBio()">Save</button>
            <button class="save-btn" onclick="cancelBio()" style="border-color:#333;color:#888">Cancel</button>
            <span class="save-msg" id="bio-msg"></span>
          </div>
        </div>
      </div>

      <!-- ETC -->
      <div class="char-etc-col">
        <div class="etc-title">Notes</div>
        <div class="etc-content" id="etc-content">—</div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const charId = params.get('id');
  if (!charId) window.location.href = 'home.html';

  let charData = {};
  let canEdit = false;
  let userPlaygroups = [];

  function buildProse(d, pgName) {
    const name = d.name ? `<b>${d.name}</b>` : '___';
    let line1 = `${name} is a`;
    if (d.sex) line1 += ` <b>${d.sex}</b>`;
    if (d.age) line1 += ` <b>${d.age}</b> year old`;
    if (d.ethnicity) line1 += ` <b>${d.ethnicity}</b>`;
    if (d.paradigm) line1 += ` <b>${d.paradigm}</b>`;
    if (d.archetype) line1 += ` <b>${d.archetype}</b>`;
    if (d.residence) line1 += ` living in <b>${d.residence}</b>`;
    if (pgName) {
      line1 += `, from the World of <b>${pgName}</b>.`;
    } else {
      line1 += '. Currently, they are not an active Character in play.';
    }
    const name2 = d.name ? `<b>${d.name}</b>` : '___';
    let line2 = `${name2} <b>typically appears as</b>`;
    if (d.appearance) line2 += ` <i>${d.appearance}</i>`;
    return line1 + '<br><br>' + line2;
  }

  async function getActivePgName() {
    if (!charData.playgroupId || !auth.currentUser) return null;
    const mDoc = await getDoc(doc(db, 'memberships', auth.currentUser.uid + '_' + charData.playgroupId));
    if (!mDoc.exists()) return null;
    const pgDoc = await getDoc(doc(db, 'playgroups', charData.playgroupId));
    return pgDoc.exists() ? pgDoc.data().name : null;
  }

  async function renderBio() {
    const pgName = await getActivePgName();
    document.getElementById('bio-prose').innerHTML = buildProse(charData, pgName);
    document.getElementById('char-name').textContent = charData.name || 'Unnamed';
    document.getElementById('char-archetype').textContent =
      [charData.paradigm, charData.archetype].filter(Boolean).join(' · ') || '';
    const quipEl = document.getElementById('char-quip');
    if (charData.quip) {
      quipEl.textContent = `"${charData.quip}"`;
      quipEl.classList.add('has-quip');
    } else {
      quipEl.textContent = 'Tagline / Quip';
      quipEl.classList.remove('has-quip');
    }
  }

  onAuthStateChanged(auth, async function(user) {
    if (!user || !user.emailVerified) {
      window.location.href = 'index.html';
      return;
    }

    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);

    const charDoc = await getDoc(doc(db, 'characters', charId));
    if (!charDoc.exists()) { window.location.href = 'home.html'; return; }
    charData = charDoc.data();
    canEdit = charData.uid === user.uid;

    const membershipsQ = query(collection(db, 'memberships'), where('uid', '==', user.uid));
    const membershipsSnap = await getDocs(membershipsQ);
    for (const mDoc of membershipsSnap.docs) {
      const pgDoc = await getDoc(doc(db, 'playgroups', mDoc.data().playgroupId));
      if (pgDoc.exists()) userPlaygroups.push({ id: pgDoc.id, name: pgDoc.data().name });
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('char-content').style.display = 'block';

    await renderBio();

    if (canEdit) {
      document.getElementById('bio-edit-btn').style.display = 'inline';
    }
  });

  window.triggerPicUpload = function() {
    if (canEdit) document.getElementById('pic-input').click();
  }

  window.handlePicChange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('pic-placeholder').style.display = 'none';
      const img = document.getElementById('char-img');
      img.src = ev.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  window.editQuip = function() {
    if (!canEdit) return;
    const current = charData.quip || '';
    const val = prompt('Enter tagline / quip:', current);
    if (val === null) return;
    updateDoc(doc(db, 'characters', charId), { quip: val }).then(() => {
      charData.quip = val;
      renderBio();
    });
  }

  window.editBio = function() {
    document.getElementById('bio-view').style.display = 'none';
    document.getElementById('bio-edit-btn').style.display = 'none';
    document.getElementById('bio-edit').style.display = 'block';
    document.getElementById('e-name').value = charData.name || '';
    document.getElementById('e-sex').value = charData.sex || '';
    document.getElementById('e-age').value = charData.age || '';
    document.getElementById('e-ethnicity').value = charData.ethnicity || '';
    document.getElementById('e-paradigm').value = charData.paradigm || '';
    document.getElementById('e-archetype').value = charData.archetype || '';
    document.getElementById('e-residence').value = charData.residence || '';
    document.getElementById('e-appearance').value = charData.appearance || '';
    const sel = document.getElementById('e-playgroup');
    sel.innerHTML = '<option value="">None — not in active play</option>';
    userPlaygroups.forEach(pg => {
      const opt = document.createElement('option');
      opt.value = pg.id;
      opt.textContent = pg.name;
      if (charData.playgroupId === pg.id) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  window.cancelBio = function() {
    document.getElementById('bio-view').style.display = 'block';
    document.getElementById('bio-edit-btn').style.display = 'inline';
    document.getElementById('bio-edit').style.display = 'none';
  }

  window.updatePreview = function() {
    const d = {
      name: document.getElementById('e-name').value.trim(),
      sex: document.getElementById('e-sex').value.trim(),
      age: document.getElementById('e-age').value.trim(),
      ethnicity: document.getElementById('e-ethnicity').value.trim(),
      paradigm: document.getElementById('e-paradigm').value.trim(),
      archetype: document.getElementById('e-archetype').value.trim(),
      residence: document.getElementById('e-residence').value.trim(),
      appearance: document.getElementById('e-appearance').value.trim(),
    };
    const selPgId = document.getElementById('e-playgroup').value;
    const pg = userPlaygroups.find(p => p.id === selPgId);
    document.getElementById('bio-prose').innerHTML = buildProse(d, pg ? pg.name : null);
  }

  window.saveBio = async function() {
    const msg = document.getElementById('bio-msg');
    const updated = {
      name: document.getElementById('e-name').value.trim(),
      sex: document.getElementById('e-sex').value.trim(),
      age: document.getElementById('e-age').value.trim(),
      ethnicity: document.getElementById('e-ethnicity').value.trim(),
      paradigm: document.getElementById('e-paradigm').value.trim(),
      archetype: document.getElementById('e-archetype').value.trim(),
      residence: document.getElementById('e-residence').value.trim(),
      appearance: document.getElementById('e-appearance').value.trim(),
      playgroupId: document.getElementById('e-playgroup').value || null,
    };
    try {
      await updateDoc(doc(db, 'characters', charId), updated);
      Object.assign(charData, updated);
      await renderBio();
      msg.textContent = 'Saved!';
      setTimeout(() => { msg.textContent = ''; cancelBio(); }, 1000);
    } catch(e) {
      msg.textContent = 'Error saving.';
      msg.style.color = '#ff6666';
    }
  }

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
