<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Character</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .page {
      padding-top: 104px;
      padding-left: 24px;
      padding-right: 24px;
      padding-bottom: 60px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 60px 0; }
    .char-card {
      display: flex;
      align-items: stretch;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      min-height: 320px;
    }
    .char-picture {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #222;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      min-height: 320px;
    }
    .char-picture img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
    }
    .char-picture-placeholder {
      color: #333;
      font-size: 12px;
      text-align: center;
      padding: 16px;
      z-index: 1;
    }
    .char-picture input[type=file] { display: none; }
    .pic-uploading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #aaa;
      z-index: 2;
    }
    .char-bio-col {
      flex: 1;
      padding: 20px 24px;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }
    .char-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 16px;
    }
    .char-header-left { flex: 1; }
    .char-name { font-size: 28px; font-weight: 700; color: #e0e0e0; margin-bottom: 4px; }
    .char-archetype { font-size: 15px; font-weight: 500; color: #666; }
    .char-quip-box {
      width: 260px;
      flex-shrink: 0;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 13px;
      font-style: italic;
      color: #555;
      background: #0e0e0e;
      min-height: 60px;
      cursor: pointer;
    }
    .char-quip-box.has-quip { color: #aaa; }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .edit-btn {
      font-size: 11px;
      color: #555;
      cursor: pointer;
      padding: 2px 8px;
      border: 1px solid #333;
      border-radius: 3px;
      font-weight: 400;
    }
    .edit-btn:hover { color: #aaa; border-color: #555; }
    .bio-prose { font-size: 13px; color: #888; line-height: 1.9; }
    .bio-prose b { color: #ccc; font-weight: 600; }
    .bio-prose i { color: #888; font-style: italic; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #555;
    }
    .field input, .field textarea, .field select {
      background: #111;
      border: 1px solid #222;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 4px;
      outline: none;
      width: 100%;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #444; }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .field select option { background: #111; }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
    .save-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .save-btn:hover { background: #222; border-color: #555; }
    .save-msg { font-size: 11px; color: #66ff99; }
    .char-etc-col {
      width: 220px;
      flex-shrink: 0;
      padding: 20px 16px;
      background: #0e0e0e;
    }
    .etc-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 10px;
    }
    .etc-content {
      font-size: 12px;
      color: #555;
      line-height: 1.7;
      min-height: 200px;
      cursor: pointer;
      white-space: pre-wrap;
    }
    .etc-content:hover { color: #777; }

    /* Mental Card */
    .mental-card {
      display: flex;
      align-items: stretch;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      min-height: 200px;
      margin-top: 16px;
    }
    .mental-col {
      flex: 1;
      padding: 16px;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }
    .mental-col:last-child { border-right: none; }
    .mental-col-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a1a;
    }
    .mental-col-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #555;
      flex: 1;
    }
    .add-entry-btn {
      background: transparent;
      border: 1px solid #222;
      color: #555;
      font-family: 'Open Sans', sans-serif;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 10px;
      display: none;
    }
    .add-entry-btn:hover { color: #aaa; border-color: #444; }

    /* Obligation / Disorder entries */
    .obligation-entry, .disorder-entry {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #888;
      line-height: 1.9;
      position: relative;
    }
    .entry-delete {
      position: absolute;
      top: 6px; right: 8px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
    }
    .entry-delete:hover { color: #c84b4b; }
    .entry-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #ccc;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      outline: none;
      width: 100%;
      padding: 2px 0;
    }
    .entry-input:focus { border-bottom-color: #666; }
    .entry-text { color: #ccc; font-weight: 500; }

    /* Moral cards (view mode) */
    .moral-cards { display: flex; flex-wrap: wrap; gap: 8px; }
    .moral-card-item {
      background: #1e3a1e;
      border: 1px solid #2d6b2d;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #66cc66;
    }
    .moral-empty { color: #333; font-size: 12px; }

    /* Moral chips (edit mode) */
    .moral-group { margin-bottom: 14px; }
    .moral-group-title {
      font-size: 10px;
      color: #444;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .moral-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .moral-chip {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid #222;
      background: #111;
      color: #555;
      cursor: pointer;
      user-select: none;
    }
    .moral-chip.selected {
      background: #1e3a1e;
      border-color: #2d6b2d;
      color: #66cc66;
    }
    .moral-chip:hover { border-color: #444; color: #aaa; }
    .moral-chip.selected:hover { border-color: #2d6b2d; }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="page">
  <div id="loading" class="empty">Loading...</div>
  <div id="char-content" style="display:none">

    <!-- Biography Card -->
    <div class="char-card">
      <div class="char-picture" id="picture-slot" onclick="triggerPicUpload()">
        <div class="char-picture-placeholder" id="pic-placeholder">Click to add picture</div>
        <img id="char-img" style="display:none">
        <input type="file" id="pic-input" accept="image/*" onchange="handlePicChange(event)">
      </div>
      <div class="char-bio-col">
        <div class="char-header">
          <div class="char-header-left">
            <div class="char-name" id="char-name"></div>
            <div class="char-archetype" id="char-archetype"></div>
          </div>
          <div class="char-quip-box" id="char-quip" onclick="editQuip()"></div>
        </div>
        <div class="section-title">
          Biography
          <span id="bio-edit-btn" class="edit-btn" style="display:none" onclick="editBio()">Edit</span>
        </div>
        <div id="bio-view">
          <div class="bio-prose" id="bio-prose"></div>
        </div>
        <div id="bio-edit" style="display:none">
          <div class="field"><label>Name</label><input type="text" id="e-name" oninput="updatePreview()"></div>
          <div class="field"><label>Sex</label><input type="text" id="e-sex" oninput="updatePreview()"></div>
          <div class="field"><label>Age</label><input type="text" id="e-age" oninput="updatePreview()"></div>
          <div class="field"><label>Ethnicity</label><input type="text" id="e-ethnicity" oninput="updatePreview()"></div>
          <div class="field"><label>Paradigm</label><input type="text" id="e-paradigm" oninput="updatePreview()"></div>
          <div class="field"><label>Archetype</label><input type="text" id="e-archetype" oninput="updatePreview()"></div>
          <div class="field"><label>Residence</label><input type="text" id="e-residence" oninput="updatePreview()"></div>
          <div class="field">
            <label>World (Playgroup)</label>
            <select id="e-playgroup" onchange="updatePreview()">
              <option value="">None — not in active play</option>
            </select>
          </div>
          <div class="field"><label>Appearance</label><textarea id="e-appearance" oninput="updatePreview()"></textarea></div>
          <div class="btn-row">
            <button class="save-btn" onclick="saveBio()">Save</button>
            <button class="save-btn" onclick="cancelBio()" style="border-color:#333;color:#888">Cancel</button>
            <span class="save-msg" id="bio-msg"></span>
          </div>
        </div>
      </div>
      <div class="char-etc-col">
        <div class="etc-title">Notes</div>
        <div class="etc-content" id="etc-content" onclick="editEtc()">—</div>
        <textarea id="etc-edit" style="display:none;width:100%;background:#111;border:1px solid #222;color:#e0e0e0;font-family:'Open Sans',sans-serif;font-size:12px;padding:8px;border-radius:4px;outline:none;resize:vertical;min-height:200px;line-height:1.6"></textarea>
        <div id="etc-btn-row" style="display:none;margin-top:8px">
          <button class="save-btn" onclick="saveEtc()" style="font-size:11px;padding:4px 12px">Save</button>
          <button class="save-btn" onclick="cancelEtc()" style="font-size:11px;padding:4px 12px;margin-left:6px;border-color:#333;color:#888">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Mental Card -->
    <div class="mental-card">

      <!-- Moral Obligations -->
      <div class="mental-col">
        <div class="mental-col-header">
          <div class="mental-col-title">Moral Obligations</div>
          <span class="edit-btn" id="obligations-edit-btn" style="display:none" onclick="editObligations()">Edit</span>
        </div>
        <div id="obligations-view"></div>
        <div id="obligations-edit-mode" style="display:none">
          <div id="obligations-list"></div>
          <button class="add-entry-btn" id="add-obligation-btn" onclick="addObligation()">+ Add</button>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button class="save-btn" onclick="doneObligations()" style="font-size:11px;padding:4px 14px">Done</button>
          </div>
        </div>
      </div>

      <!-- Morals -->
      <div class="mental-col">
        <div class="mental-col-header">
          <div class="mental-col-title">Morals</div>
          <span class="edit-btn" id="morals-edit-btn" style="display:none" onclick="editMorals()">Edit</span>
        </div>
        <div id="morals-view"><div class="moral-cards" id="moral-cards-display"></div></div>
        <div id="morals-edit-mode" style="display:none">
          <div id="morals-by-ruleset"></div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button class="save-btn" onclick="doneMorals()" style="font-size:11px;padding:4px 14px">Done</button>
          </div>
        </div>
      </div>

      <!-- Mental Disorders -->
      <div class="mental-col">
        <div class="mental-col-header">
          <div class="mental-col-title">Mental Disorders</div>
          <span class="edit-btn" id="disorders-edit-btn" style="display:none" onclick="editDisorders()">Edit</span>
        </div>
        <div id="disorders-view"></div>
        <div id="disorders-edit-mode" style="display:none">
          <div id="disorders-list"></div>
          <button class="add-entry-btn" id="add-disorder-btn" onclick="addDisorder()">+ Add</button>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button class="save-btn" onclick="doneDisorders()" style="font-size:11px;padding:4px 14px">Done</button>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  const params = new URLSearchParams(window.location.search);
  const charId = params.get('id');
  if (!charId) window.location.href = 'home.html';

  let charData = {};
  let canEdit = false;
  let userPlaygroups = [];
  let loaded = false;
  let availableRulesets = [];

  function buildProse(d, pgName) {
    const name = d.name ? `<b>${d.name}</b>` : '___';
    let line1 = `${name} is a`;
    if (d.sex) line1 += ` <b>${d.sex}</b>`;
    if (d.age) line1 += ` <b>${d.age}</b> year old`;
    if (d.ethnicity) line1 += ` <b>${d.ethnicity}</b>`;
    if (d.paradigm) line1 += ` <b>${d.paradigm}</b>`;
    if (d.archetype) line1 += ` <b>${d.archetype}</b>`;
    if (d.residence) line1 += ` living in <b>${d.residence}</b>`;
    if (pgName) {
      line1 += `, from the World of <b>${pgName}</b>.`;
    } else {
      line1 += '. Currently, they are not an active Character in play.';
    }
    const name2 = d.name ? `<b>${d.name}</b>` : '___';
    let line2 = `${name2} <b>typically appears as</b>`;
    if (d.appearance) line2 += ` <i>${d.appearance}</i>`;
    return line1 + '<br><br>' + line2;
  }

  async function getActivePgName() {
    if (!charData.playgroupId || !auth.currentUser) return null;
    const pgDoc = await getDoc(doc(db, 'playgroups', charData.playgroupId));
    return pgDoc.exists() ? pgDoc.data().name : null;
  }

  async function renderBio() {
    const pgName = await getActivePgName();
    document.getElementById('bio-prose').innerHTML = buildProse(charData, pgName);
    document.getElementById('char-name').textContent = charData.name || 'Unnamed';
    document.getElementById('char-archetype').textContent =
      [charData.paradigm, charData.archetype].filter(Boolean).join(' · ') || '';
    const quipEl = document.getElementById('char-quip');
    if (charData.quip) {
      quipEl.textContent = `"${charData.quip}"`;
      quipEl.classList.add('has-quip');
    } else {
      quipEl.textContent = 'Tagline / Quip';
      quipEl.classList.remove('has-quip');
    }
    document.getElementById('etc-content').textContent = charData.etc || '—';
    if (charData.pictureUrl) {
      document.getElementById('pic-placeholder').style.display = 'none';
      const img = document.getElementById('char-img');
      img.src = charData.pictureUrl;
      img.style.display = 'block';
    }
  }

  async function loadMentalSection() {
    const basicQ = query(collection(db, 'rulesets'), where('isBasicSet', '==', true));
    const basicSnap = await getDocs(basicQ);
    availableRulesets = [];
    if (!basicSnap.empty) availableRulesets.push({ name: 'Basic Set', morals: basicSnap.docs[0].data().morals || [] });

    if (charData.playgroupId) {
      const pgRsQ = query(collection(db, 'rulesets'), where('playgroupId', '==', charData.playgroupId));
      const pgRsSnap = await getDocs(pgRsQ);
      pgRsSnap.docs.forEach(d => availableRulesets.push({ name: d.data().name, morals: d.data().morals || [] }));
    }

    renderMoralsView();
    renderObligationsView();
    renderDisordersView();

    if (canEdit) {
      document.getElementById('morals-edit-btn').style.display = 'inline';
      document.getElementById('obligations-edit-btn').style.display = 'inline';
      document.getElementById('disorders-edit-btn').style.display = 'inline';
    }
  }

  // ── MORALS ──
  function renderMoralsView() {
    const selected = charData.selectedMorals || [];
    const display = document.getElementById('moral-cards-display');
    if (selected.length === 0) {
      display.innerHTML = '<div class="moral-empty">No morals selected.</div>';
    } else {
      display.innerHTML = selected.map(m =>
        `<div class="moral-card-item">${m}</div>`
      ).join('');
    }
  }

  window.editMorals = function() {
    document.getElementById('morals-view').style.display = 'none';
    document.getElementById('morals-edit-btn').style.display = 'none';
    document.getElementById('morals-edit-mode').style.display = 'block';

    const selected = charData.selectedMorals || [];
    const moralsDiv = document.getElementById('morals-by-ruleset');
    moralsDiv.innerHTML = '';
    availableRulesets.forEach(rs => {
      const chips = rs.morals.map(m => `
        <div class="moral-chip ${selected.includes(m) ? 'selected' : ''}"
          onclick="toggleMoral('${m}', this)">${m}</div>
      `).join('');
      moralsDiv.innerHTML += `
        <div class="moral-group">
          <div class="moral-group-title">${rs.name}</div>
          <div class="moral-chips">${chips}</div>
        </div>`;
    });
  }

  window.doneMorals = function() {
    document.getElementById('morals-view').style.display = 'block';
    document.getElementById('morals-edit-btn').style.display = 'inline';
    document.getElementById('morals-edit-mode').style.display = 'none';
    renderMoralsView();
  }

  window.toggleMoral = async function(moral, el) {
    if (!canEdit) return;
    let selected = charData.selectedMorals || [];
    if (selected.includes(moral)) {
      selected = selected.filter(m => m !== moral);
      el.classList.remove('selected');
    } else {
      selected.push(moral);
      el.classList.add('selected');
    }
    charData.selectedMorals = selected;
    await updateDoc(doc(db, 'characters', charId), { selectedMorals: selected });
  }

  // ── OBLIGATIONS ──
  function renderObligationsView() {
    const obligations = charData.moralObligations || [];
    const view = document.getElementById('obligations-view');
    if (obligations.length === 0) {
      view.innerHTML = '<div style="color:#333;font-size:12px">None.</div>';
    } else {
      view.innerHTML = obligations.map(o => `
        <div class="obligation-entry">
          I have to <span class="entry-text">${o.obligation || '___'}</span>
          because I <span class="entry-text">${o.violation || '___'}</span>
        </div>`).join('');
    }
  }

  function renderObligationsList() {
    const obligations = charData.moralObligations || [];
    const list = document.getElementById('obligations-list');
    if (obligations.length === 0) {
      list.innerHTML = '<div style="color:#333;font-size:12px;margin-bottom:8px">No entries yet.</div>';
    } else {
      list.innerHTML = obligations.map((o, i) => `
        <div class="obligation-entry">
          <span class="entry-delete" onclick="deleteObligation(${i})">×</span>
          I have to <input class="entry-input" value="${o.obligation || ''}" placeholder="..."
            onchange="saveObligation(${i}, 'obligation', this.value)">
          because I <input class="entry-input" value="${o.violation || ''}" placeholder="..."
            onchange="saveObligation(${i}, 'violation', this.value)">
        </div>`).join('');
    }
  }

  window.editObligations = function() {
    document.getElementById('obligations-view').style.display = 'none';
    document.getElementById('obligations-edit-btn').style.display = 'none';
    document.getElementById('obligations-edit-mode').style.display = 'block';
    document.getElementById('add-obligation-btn').style.display = 'inline-block';
    renderObligationsList();
  }

  window.doneObligations = function() {
    document.getElementById('obligations-view').style.display = 'block';
    document.getElementById('obligations-edit-btn').style.display = 'inline';
    document.getElementById('obligations-edit-mode').style.display = 'none';
    renderObligationsView();
  }

  window.addObligation = async function() {
    const obligations = charData.moralObligations || [];
    obligations.push({ obligation: '', violation: '' });
    charData.moralObligations = obligations;
    await updateDoc(doc(db, 'characters', charId), { moralObligations: obligations });
    renderObligationsList();
  }

  window.saveObligation = async function(i, field, val) {
    const obligations = charData.moralObligations || [];
    obligations[i][field] = val;
    charData.moralObligations = obligations;
    await updateDoc(doc(db, 'characters', charId), { moralObligations: obligations });
  }

  window.deleteObligation = async function(i) {
    const obligations = charData.moralObligations || [];
    obligations.splice(i, 1);
    charData.moralObligations = obligations;
    await updateDoc(doc(db, 'characters', charId), { moralObligations: obligations });
    renderObligationsList();
  }

  // ── DISORDERS ──
  function renderDisordersView() {
    const disorders = charData.mentalDisorders || [];
    const view = document.getElementById('disorders-view');
    if (disorders.length === 0) {
      view.innerHTML = '<div style="color:#333;font-size:12px">None.</div>';
    } else {
      view.innerHTML = disorders.map(d => `
        <div class="disorder-entry">
          I have <span class="entry-text">${d.disorder || '___'}</span>
          which means <span class="entry-text">${d.description || '___'}</span>
          and if triggered I might <span class="entry-text">${d.symptoms || '___'}</span>
        </div>`).join('');
    }
  }

  function renderDisordersList() {
    const disorders = charData.mentalDisorders || [];
    const list = document.getElementById('disorders-list');
    if (disorders.length === 0) {
      list.innerHTML = '<div style="color:#333;font-size:12px;margin-bottom:8px">No entries yet.</div>';
    } else {
      list.innerHTML = disorders.map((d, i) => `
        <div class="disorder-entry">
          <span class="entry-delete" onclick="deleteDisorder(${i})">×</span>
          I have <input class="entry-input" value="${d.disorder || ''}" placeholder="..."
            onchange="saveDisorder(${i}, 'disorder', this.value)">
          which means <input class="entry-input" value="${d.description || ''}" placeholder="..."
            onchange="saveDisorder(${i}, 'description', this.value)">
          and if triggered I might <input class="entry-input" value="${d.symptoms || ''}" placeholder="..."
            onchange="saveDisorder(${i}, 'symptoms', this.value)">
        </div>`).join('');
    }
  }

  window.editDisorders = function() {
    document.getElementById('disorders-view').style.display = 'none';
    document.getElementById('disorders-edit-btn').style.display = 'none';
    document.getElementById('disorders-edit-mode').style.display = 'block';
    document.getElementById('add-disorder-btn').style.display = 'inline-block';
    renderDisordersList();
  }

  window.doneDisorders = function() {
    document.getElementById('disorders-view').style.display = 'block';
    document.getElementById('disorders-edit-btn').style.display = 'inline';
    document.getElementById('disorders-edit-mode').style.display = 'none';
    renderDisordersView();
  }

  window.addDisorder = async function() {
    const disorders = charData.mentalDisorders || [];
    disorders.push({ disorder: '', description: '', symptoms: '' });
    charData.mentalDisorders = disorders;
    await updateDoc(doc(db, 'characters', charId), { mentalDisorders: disorders });
    renderDisordersList();
  }

  window.saveDisorder = async function(i, field, val) {
    const disorders = charData.mentalDisorders || [];
    disorders[i][field] = val;
    charData.mentalDisorders = disorders;
    await updateDoc(doc(db, 'characters', charId), { mentalDisorders: disorders });
  }

  window.deleteDisorder = async function(i) {
    const disorders = charData.mentalDisorders || [];
    disorders.splice(i, 1);
    charData.mentalDisorders = disorders;
    await updateDoc(doc(db, 'characters', charId), { mentalDisorders: disorders });
    renderDisordersList();
  }

  // ── AUTH ──
  onAuthStateChanged(auth, async function(user) {
    if (!user || !user.emailVerified) return;
    if (loaded) return;
    loaded = true;

    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);

    const charDoc = await getDoc(doc(db, 'characters', charId));
    if (!charDoc.exists()) { window.location.href = 'home.html'; return; }
    charData = charDoc.data();
    canEdit = charData.uid === user.uid;

    const membershipsQ = query(collection(db, 'memberships'), where('uid', '==', user.uid));
    const membershipsSnap = await getDocs(membershipsQ);
    for (const mDoc of membershipsSnap.docs) {
      const pgDoc = await getDoc(doc(db, 'playgroups', mDoc.data().playgroupId));
      if (pgDoc.exists()) userPlaygroups.push({ id: pgDoc.id, name: pgDoc.data().name });
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('char-content').style.display = 'block';

    await renderBio();
    await loadMentalSection();

    if (canEdit) {
      document.getElementById('bio-edit-btn').style.display = 'inline';
    }
  });

  window.triggerPicUpload = function() {
    if (canEdit) document.getElementById('pic-input').click();
  }

  window.handlePicChange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const slot = document.getElementById('picture-slot');
    const overlay = document.createElement('div');
    overlay.className = 'pic-uploading';
    overlay.textContent = 'Uploading...';
    slot.appendChild(overlay);
    try {
      const storageRef = ref(storage, `characters/${charId}/portrait`);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);
      await updateDoc(doc(db, 'characters', charId), { pictureUrl: url });
      charData.pictureUrl = url;
      document.getElementById('pic-placeholder').style.display = 'none';
      const img = document.getElementById('char-img');
      img.src = url;
      img.style.display = 'block';
    } catch(err) {
      alert('Upload failed. Try again.');
    } finally {
      slot.removeChild(overlay);
    }
  }

  window.editQuip = function() {
    if (!canEdit) return;
    const current = charData.quip || '';
    const val = prompt('Enter tagline / quip:', current);
    if (val === null) return;
    updateDoc(doc(db, 'characters', charId), { quip: val }).then(() => {
      charData.quip = val;
      renderBio();
    });
  }

  window.editBio = function() {
    document.getElementById('bio-view').style.display = 'none';
    document.getElementById('bio-edit-btn').style.display = 'none';
    document.getElementById('bio-edit').style.display = 'block';
    document.getElementById('e-name').value = charData.name || '';
    document.getElementById('e-sex').value = charData.sex || '';
    document.getElementById('e-age').value = charData.age || '';
    document.getElementById('e-ethnicity').value = charData.ethnicity || '';
    document.getElementById('e-paradigm').value = charData.paradigm || '';
    document.getElementById('e-archetype').value = charData.archetype || '';
    document.getElementById('e-residence').value = charData.residence || '';
    document.getElementById('e-appearance').value = charData.appearance || '';
    const sel = document.getElementById('e-playgroup');
    sel.innerHTML = '<option value="">None — not in active play</option>';
    userPlaygroups.forEach(pg => {
      const opt = document.createElement('option');
      opt.value = pg.id;
      opt.textContent = pg.name;
      if (charData.playgroupId === pg.id) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  window.cancelBio = function() {
    document.getElementById('bio-view').style.display = 'block';
    document.getElementById('bio-edit-btn').style.display = 'inline';
    document.getElementById('bio-edit').style.display = 'none';
  }

  window.updatePreview = function() {
    const d = {
      name: document.getElementById('e-name').value.trim(),
      sex: document.getElementById('e-sex').value.trim(),
      age: document.getElementById('e-age').value.trim(),
      ethnicity: document.getElementById('e-ethnicity').value.trim(),
      paradigm: document.getElementById('e-paradigm').value.trim(),
      archetype: document.getElementById('e-archetype').value.trim(),
      residence: document.getElementById('e-residence').value.trim(),
      appearance: document.getElementById('e-appearance').value.trim(),
    };
    const selPgId = document.getElementById('e-playgroup').value;
    const pg = userPlaygroups.find(p => p.id === selPgId);
    document.getElementById('bio-prose').innerHTML = buildProse(d, pg ? pg.name : null);
  }

  window.saveBio = async function() {
    const msg = document.getElementById('bio-msg');
    const updated = {
      name: document.getElementById('e-name').value.trim(),
      sex: document.getElementById('e-sex').value.trim(),
      age: document.getElementById('e-age').value.trim(),
      ethnicity: document.getElementById('e-ethnicity').value.trim(),
      paradigm: document.getElementById('e-paradigm').value.trim(),
      archetype: document.getElementById('e-archetype').value.trim(),
      residence: document.getElementById('e-residence').value.trim(),
      appearance: document.getElementById('e-appearance').value.trim(),
      playgroupId: document.getElementById('e-playgroup').value || null,
    };
    try {
      await updateDoc(doc(db, 'characters', charId), updated);
      Object.assign(charData, updated);
      await renderBio();
      msg.textContent = 'Saved!';
      setTimeout(() => { msg.textContent = ''; cancelBio(); }, 1000);
    } catch(e) {
      msg.textContent = 'Error saving.';
      msg.style.color = '#ff6666';
    }
  }

  window.editEtc = function() {
    if (!canEdit) return;
    document.getElementById('etc-content').style.display = 'none';
    const ta = document.getElementById('etc-edit');
    ta.value = charData.etc || '';
    ta.style.display = 'block';
    document.getElementById('etc-btn-row').style.display = 'block';
  }

  window.cancelEtc = function() {
    document.getElementById('etc-content').style.display = 'block';
    document.getElementById('etc-edit').style.display = 'none';
    document.getElementById('etc-btn-row').style.display = 'none';
  }

  window.saveEtc = async function() {
    const val = document.getElementById('etc-edit').value.trim();
    try {
      await updateDoc(doc(db, 'characters', charId), { etc: val });
      charData.etc = val;
      document.getElementById('etc-content').textContent = val || '—';
      cancelEtc();
    } catch(e) {
      alert('Error saving.');
    }
  }

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
