<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG</title>
  <style>
  body {
    background: black;
    color: white;
    font-family: 'Open Sans', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .container {
    text-align: center;
    width: 320px;
  }
  h1 {
    font-size: 48px;
    letter-spacing: 8px;
    margin-bottom: 40px;
    color: white;
  }
  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    background: #111;
    border: 1px solid #333;
    color: white;
    font-size: 14px;
    border-radius: 4px;
    box-sizing: border-box;
  }
  input:focus {
    outline: none;
    border-color: #888;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    background: #222;
    border: 1px solid #444;
    color: white;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background: #333;
  }
  .message {
    font-size: 12px;
    color: #888;
    margin-top: 10px;
  }
  .back {
    font-size: 12px;
    color: #666;
    margin-top: 12px;
    cursor: pointer;
  }
  .back:hover {
    color: #aaa;
  }
  </style>
</head>
<body>
<div class="container">
  <h1>PRIME RPG</h1>

  <div id="view-main">
    <button onclick="showView('login')">Login</button>
    <button onclick="showView('create')">Create Account</button>
  </div>

  <div id="view-login" style="display:none">
    <input type="text" id="login-username" placeholder="Username">
    <input type="password" id="login-password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="back" onclick="showView('create')">Create an account</div>
  </div>

  <div id="view-create" style="display:none">
    <input type="email" id="create-email" placeholder="Email">
    <input type="text" id="create-username" placeholder="Username">
    <input type="password" id="create-password" placeholder="Password">
    <button onclick="createAccount()">Create Account</button>
    <div class="back" onclick="showView('login')">Login</div>
  </div>

  <div class="message" id="message"></div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function showMessage(text, isError) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.style.color = isError ? '#ff6666' : '#66ff99';
  }

  window.showView = function(view) {
    document.getElementById('view-main').style.display = 'none';
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-create').style.display = 'none';
    document.getElementById('message').textContent = '';
    document.getElementById('view-' + view).style.display = 'block';
  }

  window.login = async function() {
  const username = document.getElementById('login-username').value;
  const password = document.getElementById('login-password').value;
  try {
    const q = query(collection(db, 'users'), where('username', '==', username));
    const results = await getDocs(q);
    if (results.empty) {
      showMessage('Username not found.', true);
      return;
    }
    const email = results.docs[0].data().email;
    await signInWithEmailAndPassword(auth, email, password);
    showMessage('Logged in! Redirecting...', false);
    setTimeout(() => { window.location.href = 'sheet.html'; }, 1000);
  } catch(e) {
    showMessage('Login failed. Check your username and password.', true);
  }
}

  window.createAccount = async function() {
    const email = document.getElementById('create-email').value;
    const password = document.getElementById('create-password').value;
    const username = document.getElementById('create-username').value;
    if (!username) {
      showMessage('Please enter a username.', true);
      return;
    }
    try {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, 'users', result.user.uid), {
        username: username,
        email: email,
        createdAt: new Date()
      });
      showMessage('Account created! Redirecting...', false);
      setTimeout(() => { window.location.href = 'sheet.html'; }, 1000);
    } catch(e) {
      showMessage('Could not create account. Password must be at least 6 characters.', true);
    }
  }
</script>
</body>
</html>
