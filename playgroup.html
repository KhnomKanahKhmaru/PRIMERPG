<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Playgroup</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .pg-header {
      position: fixed;
      top: 84px; left: 0; right: 0;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      padding: 14px 24px 0;
      z-index: 80;
    }
    .pg-name { font-size: 20px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; }
    .pg-primer { font-size: 12px; color: #555; margin-bottom: 12px; }
    .pg-tabs { display: flex; gap: 0; }
    .pg-tab {
      padding: 7px 18px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      user-select: none;
    }
    .pg-tab:hover { color: #aaa; }
    .pg-tab.active { color: #e0e0e0; border-bottom-color: #e0e0e0; }
    .page {
      padding-top: 200px;
      padding-bottom: 60px;
      padding-left: 24px;
      padding-right: 24px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 60px 0; }
    .doc-display { font-size: 13px; color: #888; line-height: 1.8; }
    .doc-display p { margin-bottom: 8px; }
    .doc-display p:last-child { margin-bottom: 0; }
    .doc-display p:last-child:empty { display: none; }
    .doc-display h1 { font-size: 20px; font-weight: 600; color: #ccc; margin-top: 24px; margin-bottom: 10px; }
    .doc-display h1:first-child { margin-top: 0; }
    .doc-display h2 { font-size: 16px; font-weight: 600; color: #bbb; margin-top: 18px; margin-bottom: 8px; }
    .doc-display h3 { font-size: 14px; font-weight: 600; color: #aaa; margin-top: 14px; margin-bottom: 6px; }
    .doc-display ul { padding-left: 0; list-style: none; margin-bottom: 8px; }
    .doc-display ul:last-child { margin-bottom: 0; }
    .doc-display li { padding-left: 1.5em; position: relative; margin-bottom: 2px; }
    .doc-display li::before { content: '•'; position: absolute; left: 0; color: #888; }
    .doc-display li.ql-indent-1 { padding-left: 3em; }
    .doc-display li.ql-indent-2 { padding-left: 4.5em; }
    .doc-display li.ql-indent-3 { padding-left: 6em; }
    .doc-display li.ql-indent-1::before { left: 1.5em; content: '◦'; }
    .doc-display li.ql-indent-2::before { left: 3em; content: '▪'; }
    .doc-display li.ql-indent-3::before { left: 4.5em; content: '◦'; }
    .doc-actions { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .edit-btn {
      font-size: 11px;
      color: #555;
      cursor: pointer;
      padding: 3px 10px;
      border: 1px solid #333;
      border-radius: 3px;
    }
    .edit-btn:hover { color: #aaa; border-color: #555; }
    .save-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .save-btn:hover { background: #222; border-color: #555; }
    .save-msg { font-size: 11px; margin-left: 6px; color: #66ff99; }
    .people-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .people-row:last-child { border-bottom: none; }
    .people-name { font-size: 13px; color: #e0e0e0; flex: 1; }
    .people-role {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #1a1a1a;
      color: #666;
    }
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 44px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 100;
    }
    .bottom-btn {
      padding: 6px 16px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #222;
      background: transparent;
      font-family: 'Open Sans', sans-serif;
    }
    .bottom-btn:hover { color: #ccc; border-color: #444; }
    .ql-toolbar { border-color: #222 !important; background: #1a1a1a; }
    .ql-container { border-color: #222 !important; background: #111; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 13px; min-height: 300px; }
    .ql-editor { color: #e0e0e0; line-height: 1.8; }
    .ql-editor h1 { color: #ccc; }
    .ql-editor h2 { color: #bbb; }
    .ql-editor h3 { color: #aaa; }
    .ql-stroke { stroke: #888 !important; }
    .ql-fill { fill: #888 !important; }
    .ql-picker { color: #888 !important; }
    .ql-picker-options { background: #1a1a1a !important; border-color: #333 !important; }
    .ql-toolbar.ql-snow { display: none; }
    .ql-container.ql-snow { display: none; }
    .quill-wrapper.quill-active .ql-toolbar.ql-snow { display: block; }
    .quill-wrapper.quill-active .ql-container.ql-snow { display: block; }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="pg-header">
  <div class="pg-name" id="pg-name">Loading...</div>
  <div class="pg-primer" id="pg-primer"></div>
  <div class="pg-tabs">
    <div class="pg-tab active" onclick="switchTab('news', this)">News</div>
    <div class="pg-tab" onclick="switchTab('people', this)">People</div>
    <div class="pg-tab" onclick="switchTab('world', this)">World</div>
    <div class="pg-tab" onclick="switchTab('rules', this)">Rules</div>
    <div class="pg-tab" onclick="switchTab('resources', this)">Resources</div>
  </div>
</div>

<div class="page">
  <div class="tab-panel active" id="tab-news">
    <div id="news-loading" class="empty">Loading...</div>
    <div class="empty" id="news-empty" style="display:none">No news yet!</div>
  </div>
  <div class="tab-panel" id="tab-people">
    <div id="people-list"></div>
  </div>
  <div class="tab-panel" id="tab-world">
    <div id="world-actions" class="doc-actions" style="display:none">
      <span class="edit-btn" onclick="editDoc('world')">Edit</span>
    </div>
    <div id="world-display" class="doc-display"></div>
    <div class="quill-wrapper" id="world-wrapper" style="display:none"><div id="world-editor"></div></div>
    <div id="world-edit-actions" class="doc-actions" style="display:none;margin-top:8px">
      <button class="save-btn" onclick="saveDoc('world')">Save</button>
      <button class="save-btn" onclick="cancelDoc('world')" style="margin-left:6px;border-color:#333;color:#888">Cancel</button>
      <span class="save-msg" id="world-msg"></span>
    </div>
  </div>
  <div class="tab-panel" id="tab-rules">
    <div id="rules-actions" class="doc-actions" style="display:none">
      <span class="edit-btn" onclick="editDoc('rules')">Edit</span>
    </div>
    <div id="rules-display" class="doc-display"></div>
    <div class="quill-wrapper" id="rules-wrapper" style="display:none"><div id="rules-editor"></div></div>
    <div id="rules-edit-actions" class="doc-actions" style="display:none;margin-top:8px">
      <button class="save-btn" onclick="saveDoc('rules')">Save</button>
      <button class="save-btn" onclick="cancelDoc('rules')" style="margin-left:6px;border-color:#333;color:#888">Cancel</button>
      <span class="save-msg" id="rules-msg"></span>
    </div>
  </div>
  <div class="tab-panel" id="tab-resources">
    <div class="empty">Resources coming soon.</div>
  </div>
</div>

<div class="bottom-bar">
  <button class="bottom-btn">All Sessions</button>
  <button class="bottom-btn">All Character Deaths</button>
  <button class="bottom-btn">All Shouts</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const pgId = params.get('id');
  if (!pgId) window.location.href = 'home.html';

  let canEdit = false;
  let pgData = {};
  const quills = {};

  const WORLD_DEFAULT = '<h1>Setting Synopsis</h1><p><br></p><h1>Setting Description</h1><p><br></p>';
  const RULES_DEFAULT = '<h1>Playgroup Rules</h1><p><br></p>';

  function cleanHtml(html) {
    return (html || '').replace(/(<p><br><\/p>)+$/, '').trim();
  }

  onAuthStateChanged(auth, async function(user) {
    if (!user || !user.emailVerified) {
      window.location.href = 'index.html';
      return;
    }

    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);

    const pgDoc = await getDoc(doc(db, 'playgroups', pgId));
    if (!pgDoc.exists()) { window.location.href = 'home.html'; return; }
    pgData = pgDoc.data();

    document.title = pgData.name + ' — PRIME RPG';
    document.getElementById('pg-name').textContent = pgData.name;
    document.getElementById('pg-primer').textContent = pgData.primer || '';
    document.getElementById('news-loading').style.display = 'none';
    document.getElementById('news-empty').style.display = 'block';

    const membershipDoc = await getDoc(doc(db, 'memberships', user.uid + '_' + pgId));
    let userRole = null;
    if (membershipDoc.exists()) {
      userRole = membershipDoc.data().role;
      canEdit = userRole === 'Leader' || userRole === 'Administrator';
    }

    if (userRole && userRole !== 'Leader') {
      const leaveBtn = document.createElement('button');
      leaveBtn.className = 'bottom-btn';
      leaveBtn.textContent = 'Leave Playgroup';
      leaveBtn.style.color = '#c84b4b';
      leaveBtn.style.borderColor = '#4a1a1a';
      leaveBtn.onclick = async function() {
        if (!confirm('Are you sure you want to leave this playgroup?')) return;
        await deleteDoc(doc(db, 'memberships', user.uid + '_' + pgId));
        window.location.href = 'my-playgroups.html';
      };
      document.querySelector('.bottom-bar').appendChild(leaveBtn);
    }

    if (userRole === 'Leader') {
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'bottom-btn';
      deleteBtn.textContent = 'Delete Playgroup';
      deleteBtn.style.color = '#c84b4b';
      deleteBtn.style.borderColor = '#4a1a1a';
      deleteBtn.onclick = async function() {
        if (!confirm('Are you sure you want to delete this playgroup? This cannot be undone.')) return;
        const membershipsQ = query(collection(db, 'memberships'), where('playgroupId', '==', pgId));
        const membershipsSnap = await getDocs(membershipsQ);
        for (const mDoc of membershipsSnap.docs) await deleteDoc(mDoc.ref);
        await deleteDoc(doc(db, 'playgroups', pgId));
        window.location.href = 'my-playgroups.html';
      };
      document.querySelector('.bottom-bar').appendChild(deleteBtn);
    }

    const worldVal = pgData.world_doc || '';
    const rulesVal = pgData.rules_doc || '';

    document.getElementById('world-display').innerHTML = worldVal ? cleanHtml(worldVal) : WORLD_DEFAULT;
    document.getElementById('rules-display').innerHTML = rulesVal ? cleanHtml(rulesVal) : RULES_DEFAULT;

    if (canEdit) {
      document.getElementById('world-actions').style.display = 'flex';
      document.getElementById('rules-actions').style.display = 'flex';

      ['world', 'rules'].forEach(f => {
        const val = f === 'world' ? worldVal : rulesVal;
        const def = f === 'world' ? WORLD_DEFAULT : RULES_DEFAULT;
        quills[f] = new Quill(document.getElementById(f + '-editor'), {
          theme: 'snow',
          modules: {
            toolbar: [
              ['bold', 'italic', 'underline'],
              [{ 'header': [1, 2, 3, false] }],
              [{ 'list': 'ordered' }, { 'list': 'bullet' }],
              [{ 'indent': '-1' }, { 'indent': '+1' }],
              ['clean']
            ]
          }
        });
        quills[f].root.innerHTML = val || def;
      });
    }

   const peopleList = document.getElementById('people-list');
    peopleList.innerHTML = '<div class="empty">Loading...</div>';
    const membershipsQ = query(collection(db, 'memberships'), where('playgroupId', '==', pgId));
    const membershipsSnap = await getDocs(membershipsQ);
    if (membershipsSnap.empty) {
      peopleList.innerHTML = '<div class="empty">No members yet.</div>';
    } else {
      peopleList.innerHTML = '';
      for (const mDoc of membershipsSnap.docs) {
        const m = mDoc.data();
        const userDoc = await getDoc(doc(db, 'users', m.uid));
        const username = userDoc.exists() ? userDoc.data().username : 'Unknown';
        const charsQ = query(collection(db, 'characters'), where('uid', '==', m.uid));
        const charsSnap = await getDocs(charsQ);
        const filteredChars = charsSnap.docs.filter(c => c.data().playgroupId === pgId);
        let charsHtml = '';
        if (filteredChars.length > 0) {
          const links = filteredChars.map(c =>
            `<a href="character.html?id=${c.id}" style="color:#888;font-style:italic;text-decoration:none;font-size:12px">${c.data().name || 'Unnamed'}</a>`
          );
          charsHtml = '<span style="color:#444;margin:0 8px">—</span>' + links.join('<span style="color:#444">, </span>');
        }
        peopleList.innerHTML += `
          <div class="people-row">
            <div class="people-name" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
              <strong>${username}</strong>${charsHtml}
            </div>
            <div class="people-role">${m.role}</div>
          </div>`;
      }
    }
  });

  window.editDoc = function(field) {
    document.getElementById(field + '-display').style.display = 'none';
    document.getElementById(field + '-actions').style.display = 'none';
    document.getElementById(field + '-wrapper').style.display = 'block';
    document.getElementById(field + '-wrapper').classList.add('quill-active');
    document.getElementById(field + '-edit-actions').style.display = 'flex';
  }

  window.cancelDoc = function(field) {
    document.getElementById(field + '-display').style.display = 'block';
    document.getElementById(field + '-actions').style.display = 'flex';
    document.getElementById(field + '-wrapper').style.display = 'none';
    document.getElementById(field + '-wrapper').classList.remove('quill-active');
    document.getElementById(field + '-edit-actions').style.display = 'none';
  }

  window.saveDoc = async function(field) {
    const html = cleanHtml(quills[field].root.innerHTML);
    const msg = document.getElementById(field + '-msg');
    const key = field === 'world' ? 'world_doc' : 'rules_doc';
    try {
      await updateDoc(doc(db, 'playgroups', pgId), { [key]: html });
      document.getElementById(field + '-display').innerHTML = html;
      msg.textContent = 'Saved!';
      setTimeout(() => {
        msg.textContent = '';
        cancelDoc(field);
      }, 1000);
    } catch(e) {
      msg.textContent = 'Error saving.';
      msg.style.color = '#ff6666';
    }
  }

  window.switchTab = function(name, el) {
    document.querySelectorAll('.pg-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
