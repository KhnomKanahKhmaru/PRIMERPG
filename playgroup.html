<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Playgroup</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .pg-header {
      position: fixed;
      top: 84px; left: 0; right: 0;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      padding: 14px 24px 0;
      z-index: 80;
    }
    .pg-name { font-size: 20px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; }
    .pg-primer { font-size: 12px; color: #555; margin-bottom: 12px; }
    .pg-tabs { display: flex; gap: 0; }
    .pg-tab {
      padding: 7px 18px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      user-select: none;
    }
    .pg-tab:hover { color: #aaa; }
    .pg-tab.active { color: #e0e0e0; border-bottom-color: #e0e0e0; }
    .page {
      padding-top: 200px;
      padding-bottom: 60px;
      padding-left: 24px;
      padding-right: 24px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 60px 0; }
    .world-field { margin-bottom: 28px; }
    .world-field-title {
      font-size: 15px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
    }
    .world-field-content { font-size: 13px; color: #888; line-height: 1.6; }
    .world-field-content p { margin-bottom: 8px; }
    .world-field-content p:last-child { margin-bottom: 0; }
    .world-field-content p:last-child:empty { display: none; }
    .world-field-content h1,.world-field-content h2,.world-field-content h3 { color: #ccc; margin-bottom: 6px; }
    .world-field-content ul,.world-field-content ol { padding-left: 20px; margin-bottom: 8px; }
    .world-field-content .ql-indent-1 { padding-left: 3em; }
    .world-field-content .ql-indent-2 { padding-left: 6em; }
    .world-field-content .ql-indent-3 { padding-left: 9em; }
    .world-field-content .ql-indent-4 { padding-left: 12em; }
    .world-field-content .ql-indent-5 { padding-left: 15em; }
    .world-field-content li { list-style-type: disc; margin-left: 1.5em; }
    .world-field-content li.ql-indent-1 { list-style-type: circle; }
    .world-field-content li.ql-indent-2 { list-style-type: square; }
    .edit-btn {
      font-size: 10px;
      color: #555;
      cursor: pointer;
      padding: 1px 7px;
      border: 1px solid #333;
      border-radius: 3px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .edit-btn:hover { color: #aaa; border-color: #555; }
    .save-btn {
      margin-top: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .save-btn:hover { background: #222; border-color: #555; }
    .save-msg { font-size: 11px; margin-left: 10px; color: #66ff99; }
    .people-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .people-row:last-child { border-bottom: none; }
    .people-name { font-size: 13px; color: #e0e0e0; flex: 1; }
    .people-role {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #1a1a1a;
      color: #666;
    }
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 44px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 100;
    }
    .bottom-btn {
      padding: 6px 16px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #222;
      background: transparent;
      font-family: 'Open Sans', sans-serif;
    }
    .bottom-btn:hover { color: #ccc; border-color: #444; }
    .ql-toolbar { border-color: #222 !important; background: #1a1a1a; }
    .ql-container { border-color: #222 !important; background: #111; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 13px; min-height: 120px; }
    .ql-editor { color: #e0e0e0; line-height: 1.6; }
    .ql-stroke { stroke: #888 !important; }
    .ql-fill { fill: #888 !important; }
    .ql-picker { color: #888 !important; }
    .ql-picker-options { background: #1a1a1a !important; border-color: #333 !important; }
    .ql-toolbar.ql-snow { display: none; }
    .ql-container.ql-snow { display: none; }
    .quill-wrapper.quill-active .ql-toolbar.ql-snow { display: block; }
    .quill-wrapper.quill-active .ql-container.ql-snow { display: block; }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="pg-header">
  <div class="pg-name" id="pg-name">Loading...</div>
  <div class="pg-primer" id="pg-primer"></div>
  <div class="pg-tabs">
    <div class="pg-tab active" onclick="switchTab('news', this)">News</div>
    <div class="pg-tab" onclick="switchTab('people', this)">People</div>
    <div class="pg-tab" onclick="switchTab('world', this)">World</div>
    <div class="pg-tab" onclick="switchTab('rules', this)">Rules</div>
    <div class="pg-tab" onclick="switchTab('resources', this)">Resources</div>
  </div>
</div>

<div class="page">
  <div class="tab-panel active" id="tab-news">
    <div id="news-loading" class="empty">Loading...</div>
    <div class="empty" id="news-empty" style="display:none">No news yet!</div>
  </div>
  <div class="tab-panel" id="tab-people">
    <div id="people-list"></div>
  </div>
  <div class="tab-panel" id="tab-world">
    <div class="world-field">
      <div class="world-field-title">Setting Synopsis <span id="synopsis-edit-btn" class="edit-btn" style="display:none" onclick="editField('synopsis')">Edit</span></div>
      <div id="synopsis-display" class="world-field-content"></div>
      <div class="quill-wrapper" id="synopsis-wrapper" style="display:none"><div id="synopsis-editor"></div></div>
      <div id="synopsis-save-row" style="display:none;margin-top:8px">
        <button class="save-btn" onclick="saveField('synopsis')">Save</button>
        <button class="save-btn" onclick="cancelField('synopsis')" style="margin-left:6px;border-color:#333;color:#888">Cancel</button>
        <span class="save-msg" id="synopsis-msg"></span>
      </div>
    </div>
    <div class="world-field">
      <div class="world-field-title">Setting Description <span id="description-edit-btn" class="edit-btn" style="display:none" onclick="editField('description')">Edit</span></div>
      <div id="description-display" class="world-field-content"></div>
      <div class="quill-wrapper" id="description-wrapper" style="display:none"><div id="description-editor"></div></div>
      <div id="description-save-row" style="display:none;margin-top:8px">
        <button class="save-btn" onclick="saveField('description')">Save</button>
        <button class="save-btn" onclick="cancelField('description')" style="margin-left:6px;border-color:#333;color:#888">Cancel</button>
        <span class="save-msg" id="description-msg"></span>
      </div>
    </div>
    <div class="world-field">
      <div class="world-field-title">World Events <span id="events-edit-btn" class="edit-btn" style="display:none" onclick="editField('events')">Edit</span></div>
      <div id="events-display" class="world-field-content"></div>
      <div class="quill-wrapper" id="events-wrapper" style="display:none"><div id="events-editor"></div></div>
      <div id="events-save-row" style="display:none;margin-top:8px">
        <button class="save-btn" onclick="saveField('events')">Save</button>
        <button class="save-btn" onclick="cancelField('events')" style="margin-left:6px;border-color:#333;color:#888">Cancel</button>
        <span class="save-msg" id="events-msg"></span>
      </div>
    </div>
  </div>
  <div class="tab-panel" id="tab-rules">
    <div class="world-field">
      <div class="world-field-title">Playgroup Rules <span id="rules-edit-btn" class="edit-btn" style="display:none" onclick="editField('rules')">Edit</span></div>
      <div id="rules-display" class="world-field-content"></div>
      <div class="quill-wrapper" id="rules-wrapper" style="display:none"><div id="rules-editor"></div></div>
      <div id="rules-save-row" style="display:none;margin-top:8px">
        <button class="save-btn" onclick="saveField('rules')">Save</button>
        <button class="save-btn" onclick="cancelField('rules')" style="margin-left:6px;border-color:#333;color:#888">Cancel</button>
        <span class="save-msg" id="rules-msg"></span>
      </div>
    </div>
  </div>
  <div class="tab-panel" id="tab-resources">
    <div class="empty">Resources coming soon.</div>
  </div>
</div>

<div class="bottom-bar">
  <button class="bottom-btn">All Sessions</button>
  <button class="bottom-btn">All Character Deaths</button>
  <button class="bottom-btn">All Shouts</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const pgId = params.get('id');
  if (!pgId) window.location.href = 'home.html';

  let canEdit = false;
  let pgData = {};
  const fields = ['synopsis', 'description', 'events', 'rules'];
  const quills = {};

  function cleanHtml(html) {
    return (html || '').replace(/(<p><br><\/p>)+$/, '').trim();
  }

  onAuthStateChanged(auth, async function(user) {
    if (!user || !user.emailVerified) {
      window.location.href = 'index.html';
      return;
    }

    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) setNavUsername(userDoc.data().username);

    const pgDoc = await getDoc(doc(db, 'playgroups', pgId));
    if (!pgDoc.exists()) { window.location.href = 'home.html'; return; }
    pgData = pgDoc.data();

    document.title = pgData.name + ' — PRIME RPG';
    document.getElementById('pg-name').textContent = pgData.name;
    document.getElementById('pg-primer').textContent = pgData.primer || '';
    document.getElementById('news-loading').style.display = 'none';
    document.getElementById('news-empty').style.display = 'block';

    const membershipDoc = await getDoc(doc(db, 'memberships', user.uid + '_' + pgId));
    let userRole = null;
    if (membershipDoc.exists()) {
      userRole = membershipDoc.data().role;
      canEdit = userRole === 'Leader' || userRole === 'Administrator';
    }

    if (userRole && userRole !== 'Leader') {
      const leaveBtn = document.createElement('button');
      leaveBtn.className = 'bottom-btn';
      leaveBtn.textContent = 'Leave Playgroup';
      leaveBtn.style.color = '#c84b4b';
      leaveBtn.style.borderColor = '#4a1a1a';
      leaveBtn.onclick = async function() {
        if (!confirm('Are you sure you want to leave this playgroup?')) return;
        await deleteDoc(doc(db, 'memberships', user.uid + '_' + pgId));
        window.location.href = 'my-playgroups.html';
      };
      document.querySelector('.bottom-bar').appendChild(leaveBtn);
    }

    if (userRole === 'Leader') {
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'bottom-btn';
      deleteBtn.textContent = 'Delete Playgroup';
      deleteBtn.style.color = '#c84b4b';
      deleteBtn.style.borderColor = '#4a1a1a';
      deleteBtn.onclick = async function() {
        if (!confirm('Are you sure you want to delete this playgroup? This cannot be undone.')) return;
        const membershipsQ = query(collection(db, 'memberships'), where('playgroupId', '==', pgId));
        const membershipsSnap = await getDocs(membershipsQ);
        for (const mDoc of membershipsSnap.docs) await deleteDoc(mDoc.ref);
        await deleteDoc(doc(db, 'playgroups', pgId));
        window.location.href = 'my-playgroups.html';
      };
      document.querySelector('.bottom-bar').appendChild(deleteBtn);
    }

    const world = pgData.world || {};
    const fieldMap = {
      synopsis: world.synopsis || '',
      description: world.description || '',
      events: world.events || '',
      rules: pgData.rules || ''
    };

    fields.forEach(f => {
      const val = fieldMap[f];
      const display = document.getElementById(f + '-display');
      display.innerHTML = val ? cleanHtml(val) : '<span style="color:#555">Not set.</span>';
      if (canEdit) {
        document.getElementById(f + '-edit-btn').style.display = 'inline';
        quills[f] = new Quill(document.getElementById(f + '-editor'), {
          theme: 'snow',
          modules: {
            toolbar: [
              ['bold', 'italic', 'underline'],
              [{ 'header': [1, 2, 3, false] }],
              [{ 'list': 'ordered' }, { 'list': 'bullet' }],
              [{ 'indent': '-1' }, { 'indent': '+1' }],
              ['clean']
            ]
          }
        });
        if (val) quills[f].root.innerHTML = val;
      }
    });

    const peopleList = document.getElementById('people-list');
    peopleList.innerHTML = '<div class="empty">Loading...</div>';
    const membershipsQ = query(collection(db, 'memberships'), where('playgroupId', '==', pgId));
    const membershipsSnap = await getDocs(membershipsQ);
    if (membershipsSnap.empty) {
      peopleList.innerHTML = '<div class="empty">No members yet.</div>';
    } else {
      peopleList.innerHTML = '';
      for (const mDoc of membershipsSnap.docs) {
        const m = mDoc.data();
        const userDoc = await getDoc(doc(db, 'users', m.uid));
        const username = userDoc.exists() ? userDoc.data().username : 'Unknown';
        peopleList.innerHTML += `
          <div class="people-row">
            <div class="people-name">${username}</div>
            <div class="people-role">${m.role}</div>
          </div>`;
      }
    }
  });

  window.editField = function(field) {
    document.getElementById(field + '-display').style.display = 'none';
    document.getElementById(field + '-wrapper').style.display = 'block';
    document.getElementById(field + '-wrapper').classList.add('quill-active');
    document.getElementById(field + '-save-row').style.display = 'block';
    document.getElementById(field + '-edit-btn').style.display = 'none';
  }

  window.cancelField = function(field) {
    document.getElementById(field + '-display').style.display = 'block';
    document.getElementById(field + '-wrapper').style.display = 'none';
    document.getElementById(field + '-wrapper').classList.remove('quill-active');
    document.getElementById(field + '-save-row').style.display = 'none';
    document.getElementById(field + '-edit-btn').style.display = 'inline';
  }

  window.saveField = async function(field) {
    const html = cleanHtml(quills[field].root.innerHTML);
    const msg = document.getElementById(field + '-msg');
    try {
      if (field === 'rules') {
        await updateDoc(doc(db, 'playgroups', pgId), { rules: html });
      } else {
        await updateDoc(doc(db, 'playgroups', pgId), { ['world.' + field]: html });
      }
      document.getElementById(field + '-display').innerHTML = html;
      msg.textContent = 'Saved!';
      setTimeout(() => {
        msg.textContent = '';
        cancelField(field);
      }, 1000);
    } catch(e) {
      msg.textContent = 'Error saving.';
      msg.style.color = '#ff6666';
    }
  }

  window.switchTab = function(name, el) {
    document.querySelectorAll('.pg-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
