<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIME RPG — Playgroup</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 14px; min-height: 100vh; }
    .pg-header { position: fixed; top: 84px; left: 0; right: 0; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; padding: 14px 24px 0; z-index: 80; }
    .pg-name { font-size: 20px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; }
    .pg-primer { font-size: 12px; color: #555; margin-bottom: 12px; }
    .pg-tabs { display: flex; gap: 0; }
    .pg-tab { padding: 7px 18px; font-size: 12px; color: #555; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; user-select: none; }
    .pg-tab:hover { color: #aaa; }
    .pg-tab.active { color: #e0e0e0; border-bottom-color: #e0e0e0; }
    .page { padding-top: 200px; padding-bottom: 60px; padding-left: 24px; padding-right: 24px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 60px 0; }
    .doc-display { font-size: 13px; color: #888; line-height: 1.8; }
    .doc-display p { margin-bottom: 8px; }
    .doc-display p:last-child:empty { display: none; }
    .doc-display h1 { font-size: 20px; font-weight: 600; color: #ccc; margin-top: 24px; margin-bottom: 10px; }
    .doc-display h1:first-child { margin-top: 0; }
    .doc-display h2 { font-size: 16px; font-weight: 600; color: #bbb; margin-top: 18px; margin-bottom: 8px; }
    .doc-display h3 { font-size: 14px; font-weight: 600; color: #aaa; margin-top: 14px; margin-bottom: 6px; }
    .doc-display ul { padding-left: 0; list-style: none; margin-bottom: 8px; }
    .doc-display li { padding-left: 1.5em; position: relative; margin-bottom: 2px; }
    .doc-display li::before { content: '•'; position: absolute; left: 0; color: #888; }
    .doc-display li.ql-indent-1 { padding-left: 3em; }
    .doc-display li.ql-indent-2 { padding-left: 4.5em; }
    .doc-display li.ql-indent-3 { padding-left: 6em; }
    .doc-display li.ql-indent-1::before { left: 1.5em; content: '◦'; }
    .doc-display li.ql-indent-2::before { left: 3em; content: '▪'; }
    .doc-display li.ql-indent-3::before { left: 4.5em; content: '◦'; }
    .doc-actions { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .edit-btn { font-size: 11px; color: #555; cursor: pointer; padding: 3px 10px; border: 1px solid #333; border-radius: 3px; }
    .edit-btn:hover { color: #aaa; border-color: #555; }
    .save-btn { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 6px 16px; border-radius: 4px; cursor: pointer; }
    .save-btn:hover { background: #222; border-color: #555; }
    .save-msg { font-size: 11px; margin-left: 6px; color: #66ff99; }

    /* Ruleset picker (Rules tab) */
    .ruleset-section { padding: 14px 16px; border: 1px solid #1a1a1a; border-radius: 6px; background: #0f0f0f; margin-bottom: 22px; max-width: 720px; }
    .ruleset-section-title { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #888; margin-bottom: 8px; }
    .ruleset-section-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ruleset-select { flex: 1; min-width: 240px; background: #0a0a0a; border: 1px solid #333; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 13px; padding: 8px 10px; border-radius: 4px; outline: none; }
    .ruleset-select:focus { border-color: #555; }
    .ruleset-readonly { flex: 1; min-width: 240px; color: #e0e0e0; font-size: 13px; padding: 8px 10px; border: 1px solid #1a1a1a; border-radius: 4px; background: #0a0a0a; }
    .ruleset-view-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 7px 14px; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
    .ruleset-view-btn:hover { background: #222; border-color: #555; color: #fff; }
    .ruleset-desc { font-size: 11px; color: #555; margin-top: 8px; line-height: 1.5; }
    .ruleset-save-msg { font-size: 11px; margin-left: 8px; color: #66ff99; }

    /* News tab */
    .news-feed { display: flex; flex-direction: column; gap: 6px; max-width: 720px; }
    .news-item { padding: 12px 14px; border: 1px solid #1a1a1a; border-radius: 4px; background: #111; display: flex; gap: 12px; align-items: flex-start; }
    .news-body { flex: 1; min-width: 0; }
    .news-text { color: #ccc; font-size: 13px; line-height: 1.5; }
    .news-text strong { color: #fff; font-weight: 600; }
    .news-time { font-size: 11px; color: #666; margin-top: 4px; }
    .news-delete { color: #555; font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0; display: none; }
    .news-item:hover .news-delete { display: block; }
    .news-delete:hover { color: #c84b4b; }

    /* People */
    .people-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid #1a1a1a; border-radius: 4px; background: #111; margin-bottom: 6px; }
    .people-name { font-size: 13px; color: #e0e0e0; flex: 1; min-width: 0; }
    .people-name strong { color: #fff; font-weight: 600; }
    .role-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 3px; letter-spacing: .04em; text-transform: uppercase; }
    .role-Leader { background: #3b2615; color: #e8b66e; border: 1px solid #5a3a1d; }
    .role-Administrator { background: #1f2c3a; color: #78b4e0; border: 1px solid #2f4a63; }
    .role-Member { background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; }
    .role-Player { background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; }
    .role-Banned { background: #2a1313; color: #c87777; border: 1px solid #4a1a1a; }
    .action-menu-wrap { position: relative; }
    .action-menu-btn { background: transparent; border: 1px solid #222; color: #777; font-family: 'Open Sans', sans-serif; font-size: 11px; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
    .action-menu-btn:hover { color: #ccc; border-color: #444; }
    .action-menu { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px; background: #111; border: 1px solid #333; border-radius: 4px; min-width: 200px; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
    .action-menu.open { display: block; }
    .action-menu a { display: block; padding: 8px 12px; color: #aaa; text-decoration: none; font-size: 12px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
    .action-menu a:last-child { border-bottom: none; }
    .action-menu a:hover { background: #1a1a1a; color: #fff; }
    .action-menu a.danger { color: #c87777; }
    .action-menu a.danger:hover { background: #2a1313; color: #ff8888; }
    .people-section-title { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #888; margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #1a1a1a; }

    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 44px; background: #111; border-top: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 100; }
    .bottom-btn { padding: 6px 16px; font-size: 12px; color: #666; cursor: pointer; border-radius: 4px; border: 1px solid #222; background: transparent; font-family: 'Open Sans', sans-serif; }
    .bottom-btn:hover { color: #ccc; border-color: #444; }
    .ql-toolbar { border-color: #222 !important; background: #1a1a1a; }
    .ql-container { border-color: #222 !important; background: #111; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 13px; min-height: 300px; }
    .ql-editor { color: #e0e0e0; line-height: 1.8; }
    .ql-editor h1 { color: #ccc; } .ql-editor h2 { color: #bbb; } .ql-editor h3 { color: #aaa; }
    .ql-stroke { stroke: #888 !important; } .ql-fill { fill: #888 !important; }
    .ql-picker { color: #888 !important; } .ql-picker-options { background: #1a1a1a !important; border-color: #333 !important; }
    .ql-toolbar.ql-snow { display: none; } .ql-container.ql-snow { display: none; }
    .quill-wrapper.quill-active .ql-toolbar.ql-snow { display: block; }
    .quill-wrapper.quill-active .ql-container.ql-snow { display: block; }

    .pg-header-row { display: flex; align-items: flex-start; gap: 16px; }
    .pg-header-left { flex: 1; min-width: 0; }
    .pg-header-actions { flex-shrink: 0; display: flex; gap: 8px; align-items: center; padding-top: 4px; }
    .header-btn { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 7px 14px; border-radius: 4px; cursor: pointer; }
    .header-btn:hover { background: #222; border-color: #555; }
    .header-btn.primary { background: #1f2c3a; border-color: #3a5878; color: #cfe3f6; }
    .header-btn.primary:hover { background: #263747; border-color: #4a6e8f; }
    .header-btn.banned { background: #2a1313; border-color: #4a1a1a; color: #c87777; cursor: default; }
    .header-btn:disabled { opacity: 0.5; cursor: default; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal { background: #111; border: 1px solid #333; border-radius: 6px; padding: 22px 24px; max-width: 500px; width: 90%; }
    .modal-title { font-size: 14px; font-weight: 600; color: #e0e0e0; margin-bottom: 10px; letter-spacing: .02em; }
    .modal-desc { font-size: 12px; color: #888; margin-bottom: 14px; line-height: 1.6; }
    .modal-url-row { display: flex; gap: 6px; margin-bottom: 16px; }
    .modal-url { flex: 1; background: #0a0a0a; border: 1px solid #222; color: #cfe3f6; font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 8px 10px; border-radius: 4px; outline: none; }
    .modal-btn-row { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
    .modal-btn:hover { background: #222; border-color: #555; }
    .modal-btn.danger { color: #c87777; border-color: #4a1a1a; }
    .modal-btn.danger:hover { background: #2a1313; border-color: #6a2a2a; }
    .copied-msg { font-size: 11px; color: #66ff99; margin-left: auto; align-self: center; }
  </style>
</head>
<body>
<script>injectNav();</script>

<div class="pg-header">
  <div class="pg-header-row">
    <div class="pg-header-left">
      <div class="pg-name" id="pg-name">Loading...</div>
      <div class="pg-primer" id="pg-primer"></div>
    </div>
    <div class="pg-header-actions" id="pg-header-actions"></div>
  </div>
  <div class="pg-tabs">
    <div class="pg-tab active" onclick="switchTab('news', this)">News</div>
    <div class="pg-tab" onclick="switchTab('people', this)">People</div>
    <div class="pg-tab" onclick="switchTab('world', this)">World</div>
    <div class="pg-tab" onclick="switchTab('rules', this)">Rules</div>
    <div class="pg-tab" onclick="switchTab('resources', this)">Resources</div>
  </div>
</div>

<div class="page">
  <div class="tab-panel active" id="tab-news">
    <div id="news-loading" class="empty">Loading...</div>
    <div id="news-feed" class="news-feed"></div>
    <div class="empty" id="news-empty" style="display:none">No news yet!</div>
  </div>
  <div class="tab-panel" id="tab-people">
    <div id="people-list"></div>
    <div id="banned-section" style="display:none">
      <div class="people-section-title">Banned</div>
      <div id="banned-list"></div>
    </div>
  </div>
  <div class="tab-panel" id="tab-world">
    <div id="world-actions" class="doc-actions" style="display:none"><span class="edit-btn" onclick="editDoc('world')">Edit</span></div>
    <div id="world-display" class="doc-display"></div>
    <div class="quill-wrapper" id="world-wrapper" style="display:none"><div id="world-editor"></div></div>
    <div id="world-edit-actions" class="doc-actions" style="display:none;margin-top:8px">
      <button class="save-btn" onclick="saveDoc('world')">Save</button>
      <button class="save-btn" onclick="cancelDoc('world')" style="margin-left:6px;border-color:#333;color:#888">Cancel</button>
      <span class="save-msg" id="world-msg"></span>
    </div>
  </div>
  <div class="tab-panel" id="tab-rules">
    <!-- Active Ruleset picker. Only the Leader can change it. -->
    <div class="ruleset-section">
      <div class="ruleset-section-title">Active Ruleset</div>
      <div class="ruleset-section-row" id="ruleset-row">
        <div class="ruleset-readonly">Loading…</div>
      </div>
      <div class="ruleset-desc">The game system this playgroup plays under. Governs stats, skills, XP costs, and power levels for every character in this playgroup.</div>
    </div>

    <div id="rules-actions" class="doc-actions" style="display:none"><span class="edit-btn" onclick="editDoc('rules')">Edit</span></div>
    <div id="rules-display" class="doc-display"></div>
    <div class="quill-wrapper" id="rules-wrapper" style="display:none"><div id="rules-editor"></div></div>
    <div id="rules-edit-actions" class="doc-actions" style="display:none;margin-top:8px">
      <button class="save-btn" onclick="saveDoc('rules')">Save</button>
      <button class="save-btn" onclick="cancelDoc('rules')" style="margin-left:6px;border-color:#333;color:#888">Cancel</button>
      <span class="save-msg" id="rules-msg"></span>
    </div>
  </div>
  <div class="tab-panel" id="tab-resources"><div class="empty">Resources coming soon.</div></div>
</div>

<div class="bottom-bar">
  <button class="bottom-btn">All Sessions</button>
  <button class="bottom-btn">All Character Deaths</button>
  <button class="bottom-btn">All Shouts</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, deleteDoc, collection, query, where, getDocs, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCf94yLvAtJ9pLgJ3FsV7ir4Qh9XXm3nHg",
    authDomain: "prime-rpg.firebaseapp.com",
    projectId: "prime-rpg",
    storageBucket: "prime-rpg.firebasestorage.app",
    messagingSenderId: "177905987748",
    appId: "1:177905987748:web:8856ab4fdb8f81f42eb631"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const pgId = params.get('id');
  const inviteParam = params.get('invite');
  if (!pgId) window.location.href = 'home.html';

  let canEditDocs = false;
  let pgData = {};
  let myRole = null;
  let myUid = null;
  let myUsername = '';
  const quills = {};

  function randomToken(n) {
    const chars = 'abcdefghijkmnpqrstuvwxyz23456789';
    let out = '';
    for (let i = 0; i < n; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }

  const WORLD_DEFAULT = '<h1>Setting Synopsis</h1><p><br></p><h1>Setting Description</h1><p><br></p>';
  const RULES_DEFAULT = '<h1>Playgroup Rules</h1><p><br></p>';

  function cleanHtml(html) { return (html || '').replace(/(<p><br><\/p>)+$/, '').trim(); }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.action-menu-wrap')) {
      document.querySelectorAll('.action-menu.open').forEach(m => m.classList.remove('open'));
    }
  });

  await auth.authStateReady();
  const user = auth.currentUser;
  if (!user || !user.emailVerified) {
    // preserve invite URL so login can redirect back
    if (inviteParam) {
      try { sessionStorage.setItem('postLoginRedirect', window.location.href); } catch(e) {}
    }
    window.location.href = 'index.html';
  } else {
    myUid = user.uid;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) { myUsername = userDoc.data().username; setNavUsername(myUsername); }
    initAlerts(db, user.uid);

    const pgDoc = await getDoc(doc(db, 'playgroups', pgId));
    if (!pgDoc.exists()) {
      window.location.href = 'home.html';
    } else {
      pgData = pgDoc.data();
      document.title = pgData.name + ' — PRIME RPG';
      document.getElementById('pg-name').textContent = pgData.name;
      document.getElementById('pg-primer').textContent = pgData.primer || '';

      const membershipDoc = await getDoc(doc(db, 'memberships', user.uid + '_' + pgId));
      if (membershipDoc.exists()) {
        myRole = membershipDoc.data().role;
        canEditDocs = myRole === 'Leader' || myRole === 'Administrator';

        // Fire join news once per new member (backfill-safe: only if not already marked)
        const mData = membershipDoc.data();
        if (!mData.joinNewsPosted) {
          await createPlaygroupNews(db, pgId, pgData.name, `**${myUsername}** joined the playgroup.`);
          await updateDoc(doc(db, 'memberships', user.uid + '_' + pgId), { joinNewsPosted: true });
        }
      }

      await renderHeaderActions();

      // If they arrived via invite link and aren't a member, prompt to join
      if (inviteParam && !myRole && pgData.inviteToken === inviteParam) {
        const bannedUids = pgData.bannedUids || [];
        if (!bannedUids.includes(myUid)) {
          setTimeout(() => {
            if (confirm(`You were invited to join "${pgData.name}". Join now?`)) {
              doJoin();
            }
          }, 300);
        }
      }

      if (myRole && myRole !== 'Leader') {
        const leaveBtn = document.createElement('button');
        leaveBtn.className = 'bottom-btn';
        leaveBtn.textContent = 'Leave Playgroup';
        leaveBtn.style.color = '#c84b4b';
        leaveBtn.style.borderColor = '#4a1a1a';
        leaveBtn.onclick = async function() {
          if (!confirm('Are you sure you want to leave this playgroup?')) return;
          const charsQ = query(collection(db, 'characters'), where('uid', '==', user.uid), where('playgroupId', '==', pgId));
          const charsSnap = await getDocs(charsQ);
          for (const c of charsSnap.docs) await updateDoc(c.ref, { playgroupId: null });
          await deleteDoc(doc(db, 'memberships', user.uid + '_' + pgId));
          await createPlaygroupNews(db, pgId, pgData.name, `**${myUsername}** left the playgroup.`);
          // alert staff
          const staffSnap = await getDocs(query(collection(db, 'memberships'), where('playgroupId', '==', pgId)));
          for (const mDoc of staffSnap.docs) {
            const r = mDoc.data().role;
            if (r === 'Leader' || r === 'Administrator') {
              await createAlert(db, mDoc.data().uid, `**${myUsername}** left your playgroup **${pgData.name}**.`, `playgroup.html?id=${pgId}`, pgId);
            }
          }
          window.location.href = 'my-playgroups.html';
        };
        document.querySelector('.bottom-bar').appendChild(leaveBtn);
      }

      if (myRole === 'Leader') {
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'bottom-btn';
        deleteBtn.textContent = 'Delete Playgroup';
        deleteBtn.style.color = '#c84b4b';
        deleteBtn.style.borderColor = '#4a1a1a';
        deleteBtn.onclick = async function() {
          if (!confirm('Are you sure you want to delete this playgroup? This cannot be undone.')) return;
          const membershipsQ = query(collection(db, 'memberships'), where('playgroupId', '==', pgId));
          const membershipsSnap = await getDocs(membershipsQ);
          for (const mDoc of membershipsSnap.docs) await deleteDoc(mDoc.ref);
          const allCharsQ = query(collection(db, 'characters'), where('playgroupId', '==', pgId));
          const allCharsSnap = await getDocs(allCharsQ);
          for (const c of allCharsSnap.docs) await updateDoc(c.ref, { playgroupId: null });
          // cascade delete news for this playgroup
          const newsQ = query(collection(db, 'playgroupNews'), where('playgroupId', '==', pgId));
          const newsSnap = await getDocs(newsQ);
          for (const n of newsSnap.docs) await deleteDoc(n.ref);
          await deleteDoc(doc(db, 'playgroups', pgId));
          window.location.href = 'my-playgroups.html';
        };
        document.querySelector('.bottom-bar').appendChild(deleteBtn);
      }

      const worldVal = pgData.world_doc || '';
      const rulesVal = pgData.rules_doc || '';
      document.getElementById('world-display').innerHTML = worldVal ? cleanHtml(worldVal) : WORLD_DEFAULT;
      document.getElementById('rules-display').innerHTML = rulesVal ? cleanHtml(rulesVal) : RULES_DEFAULT;

      if (canEditDocs) {
        document.getElementById('world-actions').style.display = 'flex';
        document.getElementById('rules-actions').style.display = 'flex';
        ['world', 'rules'].forEach(f => {
          const val = f === 'world' ? worldVal : rulesVal;
          const def = f === 'world' ? WORLD_DEFAULT : RULES_DEFAULT;
          quills[f] = new Quill(document.getElementById(f + '-editor'), {
            theme: 'snow',
            modules: {
              toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'header': [1, 2, 3, false] }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                [{ 'indent': '-1' }, { 'indent': '+1' }],
                ['clean']
              ]
            }
          });
          quills[f].root.innerHTML = val || def;
        });
      }

      await loadNews();
      await loadPeople();
      await loadRulesetPicker();
    }
  }

  // ── RULESET PICKER ──

  // Return all rulesets this user has access to, deduped by ID:
  //   - Basic Set (always)
  //   - Rulesets created by this user
  //   - Rulesets attached (legacy `playgroupId` field) to any playgroup
  //     the user is a member of
  // Basic Set sorts first; the rest alphabetical by name.
  async function loadAccessibleRulesets() {
    const results = new Map();

    // Basic Set (always).
    const basicSnap = await getDocs(query(
      collection(db, 'rulesets'),
      where('isBasicSet', '==', true)
    ));
    basicSnap.forEach(d => results.set(d.id, { id: d.id, ...d.data() }));

    // Rulesets this user created.
    const mineSnap = await getDocs(query(
      collection(db, 'rulesets'),
      where('createdBy', '==', myUid)
    ));
    mineSnap.forEach(d => results.set(d.id, { id: d.id, ...d.data() }));

    // Legacy: rulesets attached via playgroupId to any playgroup the user
    // is in. This preserves visibility of rulesets that were tied to a
    // playgroup under the old schema.
    const myMembershipsSnap = await getDocs(query(
      collection(db, 'memberships'),
      where('uid', '==', myUid)
    ));
    const myPgIds = myMembershipsSnap.docs.map(d => d.data().playgroupId);
    for (const id of myPgIds) {
      const pgRulesetsSnap = await getDocs(query(
        collection(db, 'rulesets'),
        where('playgroupId', '==', id)
      ));
      pgRulesetsSnap.forEach(d => {
        if (!results.has(d.id)) results.set(d.id, { id: d.id, ...d.data() });
      });
    }

    return Array.from(results.values()).sort((a, b) => {
      if (a.isBasicSet) return -1;
      if (b.isBasicSet) return 1;
      return (a.name || '').localeCompare(b.name || '');
    });
  }

  // Render the ruleset picker row. Leader gets an editable dropdown;
  // everyone else sees the current ruleset's name as read-only text.
  // Both views include a "View" link to the selected ruleset's page
  // (when the selected ruleset is loadable).
  async function loadRulesetPicker() {
    const row = document.getElementById('ruleset-row');
    const currentId = pgData.rulesetId || null;

    // Figure out what to display as the "current" ruleset.
    let currentRuleset = null;
    let currentName = 'Basic Set';
    if (currentId) {
      const rsSnap = await getDoc(doc(db, 'rulesets', currentId));
      if (rsSnap.exists()) {
        currentRuleset = { id: rsSnap.id, ...rsSnap.data() };
        currentName = currentRuleset.name || '(unnamed)';
      } else {
        currentName = '(unknown — ruleset was deleted)';
      }
    } else {
      // Default path — Basic Set. Look it up so we can link to it.
      const basicSnap = await getDocs(query(
        collection(db, 'rulesets'),
        where('isBasicSet', '==', true)
      ));
      if (!basicSnap.empty) {
        currentRuleset = { id: basicSnap.docs[0].id, ...basicSnap.docs[0].data() };
      }
    }

    const viewBtn = currentRuleset
      ? `<a class="ruleset-view-btn" href="edit-ruleset.html?id=${currentRuleset.id}">View</a>`
      : '';

    if (myRole === 'Leader') {
      const rulesets = await loadAccessibleRulesets();
      // Value "" represents "no explicit selection" → Basic Set fallback.
      // Leader picks Basic Set by choosing the "Basic Set (default)" option.
      const options = [
        `<option value="" ${!currentId ? 'selected' : ''}>Basic Set (default)</option>`,
        ...rulesets
          .filter(r => !r.isBasicSet)
          .map(r => `<option value="${r.id}" ${r.id === currentId ? 'selected' : ''}>${r.name || '(unnamed)'}</option>`)
      ].join('');
      row.innerHTML =
        `<select class="ruleset-select" id="ruleset-select" onchange="saveActiveRuleset(this.value)">${options}</select>` +
        viewBtn +
        `<span class="ruleset-save-msg" id="ruleset-save-msg"></span>`;
    } else {
      row.innerHTML =
        `<div class="ruleset-readonly">${currentName}</div>` +
        viewBtn;
    }
  }

  // Persist the Leader's ruleset selection. Empty string → null, so that
  // resolveActiveRuleset falls through to the Basic Set.
  window.saveActiveRuleset = async function(rulesetId) {
    const msg = document.getElementById('ruleset-save-msg');
    try {
      const valueToSave = rulesetId || null;
      await updateDoc(doc(db, 'playgroups', pgId), { rulesetId: valueToSave });
      pgData.rulesetId = valueToSave;
      // Rebuild the picker so the "View" button points at the new target.
      await loadRulesetPicker();
      // Flash a saved message on the newly-rebuilt row.
      const newMsg = document.getElementById('ruleset-save-msg');
      if (newMsg) {
        newMsg.textContent = 'Saved!';
        newMsg.style.color = '#66ff99';
        setTimeout(() => { if (newMsg) newMsg.textContent = ''; }, 1500);
      }
    } catch (e) {
      if (msg) {
        msg.textContent = 'Error: ' + e.message;
        msg.style.color = '#ff6666';
      }
    }
  }

  // ── NEWS ──
  async function loadNews() {
    const feed = document.getElementById('news-feed');
    const loading = document.getElementById('news-loading');
    const empty = document.getElementById('news-empty');
    loading.style.display = 'none';
    feed.innerHTML = '';

    const newsQ = query(collection(db, 'playgroupNews'), where('playgroupId', '==', pgId));
    const newsSnap = await getDocs(newsQ);
    const items = newsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    items.sort((a, b) => {
      const at = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
      const bt = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
      return bt - at;
    });

    if (items.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const canDelete = myRole === 'Leader' || myRole === 'Administrator';
    feed.innerHTML = items.map(n => `
      <div class="news-item">
        <div class="news-body">
          <div class="news-text">${renderNewsText(n.text)}</div>
          <div class="news-time">${formatNewsTime(n.createdAt)}</div>
        </div>
        ${canDelete ? `<span class="news-delete" onclick="deleteNewsItem('${n.id}')" title="Delete">×</span>` : ''}
      </div>`).join('');
  }

  window.deleteNewsItem = async function(id) {
    if (!confirm('Delete this news item? This cannot be undone.')) return;
    try {
      await deleteDoc(doc(db, 'playgroupNews', id));
      await loadNews();
    } catch (e) { alert('Failed: ' + e.message); }
  }

  // ── HEADER ACTIONS (Join / Invite) ──
  async function renderHeaderActions() {
    const box = document.getElementById('pg-header-actions');
    box.innerHTML = '';

    const bannedUids = pgData.bannedUids || [];
    const isBanned = bannedUids.includes(myUid);

    // Not a member — show Join button (unless banned)
    if (!myRole) {
      if (isBanned) {
        const banned = document.createElement('div');
        banned.className = 'header-btn banned';
        banned.textContent = 'Banned';
        box.appendChild(banned);
        return;
      }
      const joinBtn = document.createElement('button');
      joinBtn.className = 'header-btn primary';
      joinBtn.textContent = 'Join Playgroup';
      joinBtn.onclick = doJoin;
      box.appendChild(joinBtn);
      return;
    }

    // Leader/Admin — show Invite Link button
    if (myRole === 'Leader' || myRole === 'Administrator') {
      const inviteBtn = document.createElement('button');
      inviteBtn.className = 'header-btn';
      inviteBtn.textContent = 'Invite Link';
      inviteBtn.onclick = openInviteModal;
      box.appendChild(inviteBtn);
    }
  }

  async function doJoin() {
    try {
      // re-check ban
      const fresh = await getDoc(doc(db, 'playgroups', pgId));
      const banned = (fresh.data().bannedUids || []);
      if (banned.includes(myUid)) { alert('You have been banned from this playgroup.'); return; }

      await (await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js')).setDoc(doc(db, 'memberships', myUid + '_' + pgId), {
        uid: myUid,
        playgroupId: pgId,
        role: 'Member',
        joinedAt: new Date(),
        joinNewsPosted: true
      });

      await createPlaygroupNews(db, pgId, pgData.name, `**${myUsername}** joined the playgroup.`);

      // alert Leader + Admins
      const staffSnap = await getDocs(query(collection(db, 'memberships'), where('playgroupId', '==', pgId)));
      for (const mDoc of staffSnap.docs) {
        const r = mDoc.data().role;
        if ((r === 'Leader' || r === 'Administrator') && mDoc.data().uid !== myUid) {
          await createAlert(db, mDoc.data().uid, `**${myUsername}** joined your playgroup **${pgData.name}**.`, `playgroup.html?id=${pgId}`, pgId);
        }
      }

      // clean up invite param from URL if present
      if (inviteParam) {
        const clean = new URL(window.location.href);
        clean.searchParams.delete('invite');
        window.history.replaceState({}, '', clean.toString());
      }

      window.location.reload();
    } catch (e) {
      alert('Failed to join: ' + e.message);
    }
  }

  async function openInviteModal() {
    let token = pgData.inviteToken;
    if (!token) {
      token = randomToken(8);
      try {
        await updateDoc(doc(db, 'playgroups', pgId), { inviteToken: token });
        pgData.inviteToken = token;
      } catch (e) {
        alert('Failed to create invite: ' + e.message);
        return;
      }
    }

    const url = `${window.location.origin}${window.location.pathname.replace(/[^/]*$/, '')}playgroup.html?id=${pgId}&invite=${token}`;

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };
    backdrop.innerHTML = `
      <div class="modal">
        <div class="modal-title">Invite Link</div>
        <div class="modal-desc">Share this link to invite people to <strong>${pgData.name}</strong>. Anyone with the link can join. Revoking the link generates a new token and breaks the old one.</div>
        <div class="modal-url-row">
          <input type="text" class="modal-url" id="invite-url-input" readonly value="${url}">
          <button class="modal-btn" id="invite-copy-btn">Copy</button>
        </div>
        <div class="modal-btn-row">
          <button class="modal-btn danger" id="invite-revoke-btn">Revoke &amp; regenerate</button>
          <span id="invite-copied" class="copied-msg"></span>
          <button class="modal-btn" id="invite-close-btn" style="margin-left:auto">Close</button>
        </div>
      </div>`;
    document.body.appendChild(backdrop);

    document.getElementById('invite-copy-btn').onclick = async () => {
      const input = document.getElementById('invite-url-input');
      input.select();
      try {
        await navigator.clipboard.writeText(url);
        document.getElementById('invite-copied').textContent = 'Copied!';
        setTimeout(() => { const el = document.getElementById('invite-copied'); if (el) el.textContent = ''; }, 1500);
      } catch (e) {
        document.execCommand('copy');
      }
    };
    document.getElementById('invite-revoke-btn').onclick = async () => {
      if (!confirm('Revoke this invite link? The old URL will stop working, and a new one will be generated.')) return;
      const newToken = randomToken(8);
      try {
        await updateDoc(doc(db, 'playgroups', pgId), { inviteToken: newToken });
        pgData.inviteToken = newToken;
        backdrop.remove();
        openInviteModal();
      } catch (e) { alert('Failed: ' + e.message); }
    };
    document.getElementById('invite-close-btn').onclick = () => backdrop.remove();
  }

  // ── PEOPLE ──
  async function loadPeople() {
    const peopleList = document.getElementById('people-list');
    peopleList.innerHTML = '<div class="empty">Loading...</div>';

    const membershipsQ = query(collection(db, 'memberships'), where('playgroupId', '==', pgId));
    const membershipsSnap = await getDocs(membershipsQ);

    if (membershipsSnap.empty) {
      peopleList.innerHTML = '<div class="empty">No members yet.</div>';
    } else {
      const roleOrder = { Leader: 0, Administrator: 1, Member: 2, Player: 2 };
      const docs = membershipsSnap.docs.slice().sort((a, b) => {
        const ra = roleOrder[a.data().role] ?? 99;
        const rb = roleOrder[b.data().role] ?? 99;
        return ra - rb;
      });

      const rows = [];
      for (const mDoc of docs) {
        const m = mDoc.data();
        const uDoc = await getDoc(doc(db, 'users', m.uid));
        const username = uDoc.exists() ? uDoc.data().username : 'Unknown';
        const charsQ = query(collection(db, 'characters'), where('uid', '==', m.uid));
        const charsSnap = await getDocs(charsQ);
        const filtered = charsSnap.docs.filter(c => c.data().playgroupId === pgId);
        let charsHtml = '';
        if (filtered.length > 0) {
          const links = filtered.map(c =>
            `<a href="character.html?id=${c.id}" style="color:#888;font-style:italic;text-decoration:none;font-size:12px">${c.data().name || 'Unnamed'}</a>`
          );
          charsHtml = '<span style="color:#444;margin:0 8px">—</span>' + links.join('<span style="color:#444">, </span>');
        }

        const actionsHtml = buildActionMenu(m.uid, username, m.role);
        const youBadge = m.uid === myUid ? '<span style="color:#555;font-size:11px;margin-left:4px">(you)</span>' : '';

        rows.push(`
          <div class="people-row">
            <div class="people-name" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
              <strong>${username}</strong>${youBadge}${charsHtml}
            </div>
            <div class="role-badge role-${m.role}">${m.role}</div>
            ${actionsHtml}
          </div>`);
      }
      peopleList.innerHTML = rows.join('');
    }

    const bannedUids = pgData.bannedUids || [];
    const bannedSection = document.getElementById('banned-section');
    const bannedList = document.getElementById('banned-list');
    if (bannedUids.length > 0 && (myRole === 'Leader' || myRole === 'Administrator')) {
      bannedSection.style.display = 'block';
      const bannedRows = [];
      for (const uid of bannedUids) {
        const uDoc = await getDoc(doc(db, 'users', uid));
        const uname = uDoc.exists() ? uDoc.data().username : 'Unknown';
        const unbanBtn = myRole === 'Leader'
          ? `<button class="action-menu-btn" onclick="unbanUser('${uid}','${uname.replace(/'/g,"\\'")}')">Unban</button>`
          : '';
        bannedRows.push(`
          <div class="people-row">
            <div class="people-name"><strong>${uname}</strong></div>
            <div class="role-badge role-Banned">Banned</div>
            ${unbanBtn}
          </div>`);
      }
      bannedList.innerHTML = bannedRows.join('');
    } else {
      bannedSection.style.display = 'none';
      bannedList.innerHTML = '';
    }
  }

  function buildActionMenu(targetUid, targetName, targetRole) {
    if (targetUid === myUid) return '';
    const items = [];
    const safeName = targetName.replace(/'/g, "\\'");

    if (myRole === 'Leader') {
      if (targetRole === 'Member' || targetRole === 'Player') {
        items.push(`<a onclick="promoteToAdmin('${targetUid}','${safeName}')">Promote to Administrator</a>`);
        items.push(`<a onclick="transferLeader('${targetUid}','${safeName}')">Transfer Leader role</a>`);
        items.push(`<a class="danger" onclick="kickUser('${targetUid}','${safeName}')">Kick</a>`);
        items.push(`<a class="danger" onclick="banUser('${targetUid}','${safeName}')">Ban</a>`);
      } else if (targetRole === 'Administrator') {
        items.push(`<a onclick="demoteToMember('${targetUid}','${safeName}')">Demote to Member</a>`);
        items.push(`<a onclick="transferLeader('${targetUid}','${safeName}')">Transfer Leader role</a>`);
        items.push(`<a class="danger" onclick="kickUser('${targetUid}','${safeName}')">Kick</a>`);
        items.push(`<a class="danger" onclick="banUser('${targetUid}','${safeName}')">Ban</a>`);
      }
    } else if (myRole === 'Administrator') {
      if (targetRole === 'Member' || targetRole === 'Player') {
        items.push(`<a class="danger" onclick="kickUser('${targetUid}','${safeName}')">Kick</a>`);
        items.push(`<a class="danger" onclick="banUser('${targetUid}','${safeName}')">Ban</a>`);
      }
    }

    if (items.length === 0) return '';
    const menuId = 'menu-' + targetUid;
    return `
      <div class="action-menu-wrap">
        <button class="action-menu-btn" onclick="toggleActionMenu('${menuId}')">Actions ▾</button>
        <div class="action-menu" id="${menuId}">${items.join('')}</div>
      </div>`;
  }

  window.toggleActionMenu = function(id) {
    const target = document.getElementById(id);
    document.querySelectorAll('.action-menu.open').forEach(m => { if (m.id !== id) m.classList.remove('open'); });
    target.classList.toggle('open');
  }

  async function unlinkUserCharacters(uid) {
    const charsQ = query(collection(db, 'characters'), where('uid', '==', uid), where('playgroupId', '==', pgId));
    const charsSnap = await getDocs(charsQ);
    for (const c of charsSnap.docs) await updateDoc(c.ref, { playgroupId: null });
  }

  async function getUsername(uid) {
    const d = await getDoc(doc(db, 'users', uid));
    return d.exists() ? d.data().username : 'Unknown';
  }

  window.promoteToAdmin = async function(uid, name) {
    if (!confirm(`Promote ${name} to Administrator?`)) return;
    try {
      await updateDoc(doc(db, 'memberships', uid + '_' + pgId), { role: 'Administrator' });
      await createAlert(db, uid, `You were promoted to **Administrator** in **${pgData.name}**.`, `playgroup.html?id=${pgId}`, pgId);
      await createPlaygroupNews(db, pgId, pgData.name, `**${name}** was promoted to Administrator.`);
      await loadPeople(); await loadNews();
    } catch (e) { alert('Failed: ' + e.message); }
  }

  window.demoteToMember = async function(uid, name) {
    if (!confirm(`Demote ${name} to Member?`)) return;
    try {
      await updateDoc(doc(db, 'memberships', uid + '_' + pgId), { role: 'Member' });
      await createAlert(db, uid, `You were demoted to **Member** in **${pgData.name}**.`, `playgroup.html?id=${pgId}`, pgId);
      await createPlaygroupNews(db, pgId, pgData.name, `**${name}** was demoted to Member.`);
      await loadPeople(); await loadNews();
    } catch (e) { alert('Failed: ' + e.message); }
  }

  window.transferLeader = async function(uid, name) {
    const confirmText = prompt(`This will transfer full Leader control to ${name}. You will become an Administrator.\n\nType "${name}" to confirm:`);
    if (confirmText === null) return;
    if (confirmText.trim() !== name) { alert('Name did not match. Cancelled.'); return; }
    try {
      await updateDoc(doc(db, 'memberships', uid + '_' + pgId), { role: 'Leader' });
      await updateDoc(doc(db, 'memberships', myUid + '_' + pgId), { role: 'Administrator' });
      await updateDoc(doc(db, 'playgroups', pgId), { leader: uid });
      await createAlert(db, uid, `The **Leader** role of **${pgData.name}** was transferred to you.`, `playgroup.html?id=${pgId}`, pgId);
      await createPlaygroupNews(db, pgId, pgData.name, `**${name}** is now the Leader of the playgroup.`);
      window.location.reload();
    } catch (e) { alert('Failed: ' + e.message); }
  }

  window.kickUser = async function(uid, name) {
    if (!confirm(`Kick ${name} from this playgroup? Their characters in this world will be unlinked (not deleted).`)) return;
    try {
      await unlinkUserCharacters(uid);
      await deleteDoc(doc(db, 'memberships', uid + '_' + pgId));
      await createAlert(db, uid, `You were kicked from the playgroup **${pgData.name}**.`, null, pgId);
      await createPlaygroupNews(db, pgId, pgData.name, `**${name}** was removed from the playgroup.`);
      await loadPeople(); await loadNews();
    } catch (e) { alert('Failed: ' + e.message); }
  }

  window.banUser = async function(uid, name) {
    if (!confirm(`Ban ${name}? They will be kicked, their characters unlinked, and they will be blocked from rejoining.`)) return;
    try {
      await unlinkUserCharacters(uid);
      await deleteDoc(doc(db, 'memberships', uid + '_' + pgId));
      await updateDoc(doc(db, 'playgroups', pgId), { bannedUids: arrayUnion(uid) });
      await createAlert(db, uid, `You were banned from the playgroup **${pgData.name}**.`, null, pgId);
      await createPlaygroupNews(db, pgId, pgData.name, `**${name}** was removed from the playgroup.`);
      const fresh = await getDoc(doc(db, 'playgroups', pgId));
      pgData = fresh.data();
      await loadPeople(); await loadNews();
    } catch (e) { alert('Failed: ' + e.message); }
  }

  window.unbanUser = async function(uid, name) {
    if (!confirm(`Unban ${name}? They will be able to rejoin this playgroup.`)) return;
    try {
      await updateDoc(doc(db, 'playgroups', pgId), { bannedUids: arrayRemove(uid) });
      const fresh = await getDoc(doc(db, 'playgroups', pgId));
      pgData = fresh.data();
      await loadPeople();
    } catch (e) { alert('Failed: ' + e.message); }
  }

  window.editDoc = function(field) {
    document.getElementById(field + '-display').style.display = 'none';
    document.getElementById(field + '-actions').style.display = 'none';
    document.getElementById(field + '-wrapper').style.display = 'block';
    document.getElementById(field + '-wrapper').classList.add('quill-active');
    document.getElementById(field + '-edit-actions').style.display = 'flex';
  }
  window.cancelDoc = function(field) {
    document.getElementById(field + '-display').style.display = 'block';
    document.getElementById(field + '-actions').style.display = 'flex';
    document.getElementById(field + '-wrapper').style.display = 'none';
    document.getElementById(field + '-wrapper').classList.remove('quill-active');
    document.getElementById(field + '-edit-actions').style.display = 'none';
  }
  window.saveDoc = async function(field) {
    const html = cleanHtml(quills[field].root.innerHTML);
    const msg = document.getElementById(field + '-msg');
    const key = field === 'world' ? 'world_doc' : 'rules_doc';
    try {
      await updateDoc(doc(db, 'playgroups', pgId), { [key]: html });
      document.getElementById(field + '-display').innerHTML = html;
      msg.textContent = 'Saved!';
      setTimeout(() => { msg.textContent = ''; cancelDoc(field); }, 1000);
    } catch(e) { msg.textContent = 'Error saving.'; msg.style.color = '#ff6666'; }
  }

  window.switchTab = function(name, el) {
    document.querySelectorAll('.pg-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  window.logout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  }
</script>
